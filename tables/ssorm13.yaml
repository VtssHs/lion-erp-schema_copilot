table: ssorm13
database: LionGroupERP
module: 訂單管理系統 (Sales Order)
aliases:
- 商務部旅客機票資料
- ssorm13
- ORM13
- SSORM13
description: 商務部旅客機票資料。記錄商務部（企業差旅）旅客的機票詳細資訊，包含航班、票價、PNR、企業申請單、簽證辦理等專業資料
columns:
- name: or13_ordr
  type: varchar
  fk: ssorm10.orer_ordr
  description: 訂單編號
- name: or13_year
  type: varchar
  fk: ssorm10.orer_year
  description: 訂單年碼
- name: or13_seq
  type: int
  pk: true
  description: 序號
- name: or13_fdate
  type: datetime
  description: 出發日
- name: or13_fflightNo
  type: varchar
  description: 出發航班
- name: or13_tdate
  type: datetime
  description: 回程日
- name: or13_tflightNo
  type: varchar
  description: 回程航班
- name: or13_carr
  type: varchar
  description: 票源航空公司
  note: 如：BR
- name: or13_al
  type: varchar
  description: 航段內航空公司
  note: 如：BR/MU/MU/BR
- name: or13_class
  type: varchar
  description: 航段內艙等
  note: 如：Y/M/M/Y
- name: or13_rtid
  type: varchar
  description: 航段
  note: 如：TPE/HKG/SHA/HKG/SHA
- name: or13_country
  type: varchar
  description: 目的地國家
- name: or13_city
  type: varchar
  description: 目的地城市
- name: or13_name
  type: varchar
  description: 行程(產品名稱)
  note: 原 crtid
- name: or13_bsp_amt
  type: decimal
  description: BSP票價
- name: or13_tax1
  type: decimal
  description: 燃油稅
- name: or13_tax9
  type: decimal
  description: 其他稅金
- name: or13_amt4
  type: decimal
  description: 手續費
- name: or13_pnr
  type: varchar
  description: PNR
  note: 1E=Eterm, ZZ=其他; 其中 AB 及 AM 才可以用 PNR 帶入訂位資料
- name: or13_crs
  type: varchar
  description: CRS系統
  note: AB=Abacus, 1G=Galileo, AM=Amadeus, AL=AirLine
- name: or13_pnr_ldate
  type: datetime
  description: PNR最後修改日
- name: or13_pnr_qty
  type: int
  description: PNR修改次數
- name: or13_tkno
  type: varchar
  description: 機票號碼
  note: '格式: xxx xxxxxxxxxx/ xxx xxxxxxxxxx 目前最多3組'
- name: or13_reissue
  type: bit
  description: Re票
  note: 1=re票
- name: or13_empid
  type: varchar
  description: 旅客員工編號
- name: or13_empid2
  type: varchar
  description: 代訂員編
- name: or13_deptid
  type: varchar
  description: 旅客部門代號
- name: or13_dept_name
  type: varchar
  description: 分公司名稱
- name: or13_orderid
  type: varchar
  description: 旅客企業内的申請單號
- name: or13_proj
  type: varchar
  description: 專案代號
- name: or13_request
  type: varchar
  description: 差旅/個人
  note: 0=差旅, 1=個人
- name: or13_request_date
  type: datetime
  description: 需求日期
- name: or13_travel_purpose
  type: varchar
  description: 差旅目的
- name: or13_vscountry
  type: varchar
  description: 證照國家
- name: or13_vsseq
  type: varchar
  description: 證照類別
  note: 1=已送件, F=已完成, B=補件中
- name: or13_visa_flow
  type: varchar
  description: 辦證進度
- name: or13_visa_date
  type: datetime
  description: 預計辦好日
- name: or13_hotel
  type: varchar
  description: 旅館代號
- name: or13_night
  type: int
  description: 旅館住x晚
- name: or13_desc
  type: varchar
  description: 企業特殊說明 1
- name: or13_desc2
  type: varchar
  description: 企業特殊說明 2
- name: or13_desc3
  type: varchar
  description: 企業特殊說明 3
- name: or13_desc4
  type: varchar
  description: 企業特殊說明 4
- name: or13_fnio1
  type: varchar
  description: 代轉編號1
- name: or13_fnio2
  type: varchar
  description: 代轉編號2
- name: or13_fnio3
  type: varchar
  description: 代轉編號3
- name: or13_mileage
  type: int
  description: 哩程數
- name: or13_co2
  type: decimal
  description: 排碳量
