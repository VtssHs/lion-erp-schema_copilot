table: istbm00
database: LionGroupRPM
module: ISTBM（Infrastructure System Table Basic Master）
aliases:
- 基礎代碼主檔
- istbm00
- ISTBM00
description: 基礎代碼主檔
columns:
- name: __tabl_type__
  type: varchar(50)
  description: 代碼類別
  note: 統一大寫（如 `ORDER_STATUS`, `PRODUCT_CATEGORY`）
  pk: true
- name: __tabl_code__
  type: varchar(50)
  description: 代碼
  note: 空字串 `''` 表示類別名稱註記用（類別本身的說明）
- name: __tabl_cname__
  type: varchar(100)
  description: 中文名稱
  note: 主要顯示名稱
- name: __tabl_ename__
  type: varchar(100)
  description: 英文名稱
  note: '`*` 表示可於 opag29 自行授權'
- name: __tabl_dname__
  type: varchar(100)
  description: 顯示名稱
  note: 可能為簡稱或前台顯示名
- name: __tabl_desc__
  type: text
  description: 備註
  note: 詳細說明
- name: __tabl_order__
  type: int
  description: 顯示順序
  note: 同類別內的排序
- name: __tabl_sts__
  type: bit
  description: 已停用
  note: '`1` = 已停用，`0` = 啟用中'
- name: __tabl_sts1__
  type: bit
  description: 系統專用
  note: '`1` = 系統專用，不提供使用者修改'
- name: __tabl_stfn__
  type: varchar(500)
  description: 授權建檔名單
  note: 格式：`,008013,008079,`（員工編號清單） 若類別有設定名單，則提供該 user 增修權限
- name: __tabl_typekind__
  type: varchar(50)
  description: 使用範圍
  note: 類別太多時，用 `kind` 作為上層分類 例：`ORDER` kind 下有多個 type
- name: __tabl_use__
  type: varchar(200)
  description: 其他使用
  note: 特殊用途欄位 例：`__tabl_type__ = 'UPLOAD'` 時存「合約;其他文件」
- name: __tabl_mdate__
  type: datetime
  description: 增修主機時間
  note: 最後異動時間
- name: __tabl_mstfn__
  type: varchar(50)
  description: 增修者姓名
  note: 格式：`直團王大明`
