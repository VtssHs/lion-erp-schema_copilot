table: tppdm26
database: LionGroupERP
module: 團體產品系統 (Group Product)
aliases:
- 行程上下車地點關聯檔
- tppdm26
- PDM26
- TPPDM26
description: 行程上下車地點關聯檔。定義行程範本的上下車集合地點（各團若未設定，就抓該團行程的設定）
columns:
- name: pd26_tur2
  type: varchar(20)
  fk: tppdm20.pd20_tur2
  description: 行程代號
  note: '**PK1**'
  pk: true
- name: pd26_station
  type: varchar(20)
  fk: optbm20.tb20_station
  description: 集合地點代碼
  note: '**PK2**'
- name: pd26_time
  type: varchar(10)
  description: 集合時間
  note: 格式如：07:00、08:30
- name: pd26_station1
  type: varchar(20)
  fk: optbm20.tb20_station
  description: 上車地點代碼
- name: pd26_time1
  type: varchar(10)
  description: 上車時間
  note: 格式如：07:15、08:45
- name: pd26_notshow
  type: bit
  description: 前台不顯示
  note: 0=顯示, 1=不顯示
- name: pd26_mstfn
  type: varchar(50)
  description: 維護者姓名及時區
  note: 單位+姓名+空格+時區 ex:直團王大明 TW
- name: pd26_mdate
  type: datetime
  description: 當地維護時間
  note: 維護者當地時間
- name: pd26_msysdate
  type: datetime
  description: 主機時間
  note: 系統伺服器時間
