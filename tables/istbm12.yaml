table: istbm12
database: LionGroupERP
module: ''
aliases:
- 各單位線別毛利率與日售價資料
- istbm12
- TBM12
- ISTBM12
description: 各單位線別毛利率與日售價資料
columns:
- name: tb12_key
  type: varchar(6)
  pk: true
  description: 序號 (2碼年+4碼流水)
- name: tb12_kind
  type: int
  description: 類別 (0=負責人設定, 1=財務長設定)
- name: tb12_line
  type: varchar
  description: 線別
- name: tb12_dline
  type: varchar
  description: 副線別
- name: tb12_prof
  type: varchar
  description: 單位 (負責人依單位設定)
- name: tb12_country
  type: varchar
  description: 雄獅國家 (財務長依國家設定)
- name: tb12_prodsts
  type: int
  description: 團型 (2=票團)
- name: tb12_profit_w
  type: decimal(5,2)
  description: 同業毛利% (5%→5.00)
- name: tb12_profit_d
  type: decimal(5,2)
  description: 直客毛利%
- name: tb12_fdate
  type: date
  description: 出發效期-起
- name: tb12_tdate
  type: date
  description: 出發效期-訖
- name: tb12_sts
  type: int
  description: 已作廢/未生效
- name: tb12_fsts
  type: int
  description: 已審核處理
- name: tb12_desc
  type: text
  description: 審核記錄
- name: tb12_mstfn
  type: varchar
  description: 維護者姓名 (單位+姓名)
- name: tb12_msysdate
  type: datetime
  description: 維護主機時間
