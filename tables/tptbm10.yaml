table: tptbm10
database: LionGroupERP
module: TPTBM (標準團名管理)
aliases:
- 團體銷售資訊說明檔
- 注意事項主檔
- 標準團名管理
- tptbm10
- TPTBM10
description: 團體銷售資訊說明檔 (注意事項主檔)
columns:
- name: note_area
  type: varchar
  pk: true
  description: 地區。各說明分析資料，依地區別建立
- name: note_darea
  type: varchar
  pk: true
  description: 細地區
- name: note_note
  type: varchar
  pk: true
  fk_note: FK → Istbm00 (NOTE)
  description: 說明項目。注意事項類別代碼
- name: note_carr
  type: varchar
  pk: true
  description: 航空公司/序號。脫隊資訊=各航空公司；非脫隊時，主要用在食衣住行資訊上，為序號欄位(01,02..)
- name: note_country
  type: varchar
  pk: true
  description: 出團雄獅國家。非脫隊時，主要用在食衣住行資訊上，為序號欄位(01,02..)
- name: note_dname
  type: nvarchar
  description: 內容名稱。注意事項的標題或摘要
- name: note_desc
  type: nvarchar(max)
  description: 內容。注意事項的詳細內容
- name: note_usts
  type: char(1)
  description: 要上架行程網頁。1=要秀在行程網頁上
- name: note_mstfn
  type: varchar
  description: 維護者及時區。單位+姓名+空格+時區，例：直團王大明 TW
- name: note_msysdate
  type: datetime
  description: 維護主機時間。系統記錄時間
- name: note_mdate
  type: datetime
  description: 當地維護時間。維護者當地時間
