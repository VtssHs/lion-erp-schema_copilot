table: tppdm20
database: LionGroupERP
module: ''
aliases:
- 團體行程代號主檔
- tppdm20
- PDM20
- TPPDM20
description: 團體行程代號主檔。儲存可重複使用的標準行程範本，作為建立團號的基礎資料
columns:
- name: pd20_tur2
  type: varchar(20)
  nullable: false
  description: 行程代號
  note: 主鍵，僅允許英數字
- name: pd20_sts
  type: char(1)
  nullable: true
  description: 已作廢
  note: Y=已作廢 N=有效
- name: pd20_html
  type: text
  nullable: true
  description: 自訂HTML
  note: 標準團名非一般者可自訂網頁內容
- name: pd20_type
  type: char(1)
  nullable: true
  description: 行程類別
  note: 空白=團體 F=自由行 I=INB
- name: pd20_tur2_outb
  type: varchar(20)
  nullable: true
  description: 對應OUTB行程代號
  note: 用於 INB/OUTB 行程對照
- name: pd20_line
  type: varchar(10)
  nullable: false
  fk: tptbm
  description: 線別
  note: 與標準團名須一致
- name: pd20_dline
  type: varchar(10)
  nullable: true
  fk: tptbm
  description: 副線別
  note: 與標準團名須一致
- name: pd20_area
  type: varchar(10)
  nullable: false
  fk: tptbm
  description: 地區
  note: 與標準團名須一致
- name: pd20_darea
  type: varchar(10)
  nullable: true
  fk: tptbm
  description: 細地區
  note: 與標準團名須一致
- name: pd20_prodname
  type: varchar(50)
  nullable: true
  fk_note: FK → 標準團名檔，有值時行程名稱=NULL
  description: 標準團名
  note: 有值時行程名稱=NULL
- name: pd20_dname
  type: varchar(200)
  nullable: true
  description: 內部顯示名稱
  note: 系統內部使用的行程名稱
- name: pd20_name
  type: varchar(200)
  nullable: true
  description: 網頁名稱
  note: B2C 網站顯示的行程名稱
- name: pd20_days
  type: int
  nullable: false
  description: 天數
  note: 行程總天數
- name: pd20_normal
  type: char(1)
  nullable: false
  description: 標準行程
  note: Y=標準 N=非標準，產品部才可設定，INB 一律=標準
- name: pd20_country
  type: varchar(10)
  nullable: true
  description: 雄獅國家代碼
  note: 主要用於自費活動帶價格
- name: pd20_prof
  type: varchar(10)
  nullable: false
  description: 建檔/負責單位
  note: 權限控管，業務建立非標準行程需 copy 成自己單位
- name: pd20_html_date
  type: datetime
  nullable: true
  description: 網頁更新時間
  note: NULL=尚未產生行程網頁
- name: pd20_mstfn
  type: varchar(50)
  nullable: true
  description: 維護者單位姓名時區
  note: '格式：單位+姓名+空格+時區 (ex: 直團王大明 TW)'
- name: pd20_mdate
  type: datetime
  nullable: true
  description: 當地維護日期
  note: 維護者時區的日期時間
- name: pd20_msysdate
  type: datetime
  nullable: true
  description: 主機時間
  note: 系統時間戳記
- name: pd20_tripidno
  type: varchar(20)
  nullable: true
  fk: PCM.dbo
  description: 行程組合器序號
- name: pd20_salememo
  type: text
  nullable: true
  description: 銷售說明
  note: 行程銷售重點、特色說明
- name: pd20_voltage
  type: varchar(50)
  nullable: true
  description: 電壓
  note: '說明會資料顯示，格式: 110,210,120'
- name: pd20_socket
  type: varchar(50)
  nullable: true
  description: 插座
  note: '說明會資料顯示，格式: 1,3,5,6,7 (代碼)'
- name: pd20_feature_src
  type: char(1)
  nullable: true
  description: 特色來源
  note: S=團體行程 C=站長平台
- name: pd20_bus
  type: char(1)
  nullable: true
  description: 是否有綁定中控巴士路線
  note: 0=無 1=有
  default: '0'
- name: pd20_tra
  type: char(1)
  nullable: true
  description: 是否有綁定中控火車路線
  note: 0=無 1=有
  default: '0'
- name: pd20_marketing_oimg
  type: varchar(500)
  nullable: true
  description: 直客行銷圖片網址
  note: 桌面版行銷圖
- name: pd20_marketing_mimg
  type: varchar(500)
  nullable: true
  description: 直客行銷圖片網址(M版)
  note: 手機版行銷圖
- name: pd20_marketing_url
  type: varchar(500)
  nullable: true
  description: 直客行銷圖片跳轉連結
  note: 行銷圖點擊後的導向 URL
- name: pd20_marketing_content
  type: text
  nullable: true
  description: 直客行銷文案
  note: 行銷活動說明文字
- name: pd20_passcountry
  type: varchar(500)
  nullable: true
  description: 行程所經國家
  note: 多國行程的國家清單
- name: pd20_passcity
  type: varchar(500)
  nullable: true
  description: 行程所經城市
  note: 行程途經的主要城市
