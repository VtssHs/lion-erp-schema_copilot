table: tppdm65
database: LionGroupERP
module: 團體產品管理 (TPPDM) — 郵輪子系統
aliases:
- 郵輪岸上觀光車次團體
- tppdm65
- PDM65
- TPPDM65
description: 郵輪岸上觀光車次團體。記錄郵輪岸上觀光特定車次與出發團的關聯，即哪些出發團在哪個日期搭乘哪個岸上觀光車次
columns:
- name: pd65_localtour
  type: varchar
  description: 編號
  note: 關聯 tppdm62 岸上觀光主檔
- name: pd65_date
  type: datetime
  pk: true
  description: 日期
- name: pd65_bus
  type: varchar
  description: 車次
  note: 關聯 tppdm64 岸上觀光車次
- name: pd65_prod
  type: varchar
  fk: tppdm10.prod_prod
  description: 團號
- name: pd65_prodcomp
  type: varchar
  pk: true
  description: 團號公司
- name: pd65_group
  type: varchar
  description: 多選一群組代碼
  note: 同群組代碼的車次為互斥選項
- name: pd65_mstfn
  type: varchar
  description: 維護者姓名及時區
  note: 格式：單位+姓名+空格+時區，例：`資訊王大明 TW`；此資料未存當地時間，目前只用於台灣故未有異常
- name: pd65_msysdate
  type: datetime
  description: 維護主機時間
