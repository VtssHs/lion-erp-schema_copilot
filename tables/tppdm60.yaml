table: tppdm60
database: LionGroupERP
module: 團體產品系統 (Group Product) - 郵輪相關
aliases:
- 郵輪團說明會資料檔
- 郵輪相關
- tppdm60
- PDM60
- TPPDM60
description: 郵輪團說明會資料檔。記錄郵輪團的說明會場次資料
columns:
- name: pd60_prod
  type: varchar
  pk: true
  fk: tppdm10.prod_prod
  description: 團號
  note: (part), ，**此欄位缺失**
- name: pd60_prodcomp
  type: varchar
  description: 團控公司
  note: '**此欄位可能缺失**'
- name: pd60_meetno
  type: varchar(6)
  pk: true
  description: 說明會場次編號
  note: '(part), 年度2碼 + 流水號4碼 (如: 250001)'
- name: pd60_meetdate
  type: date
  description: 說明會日期
  note: 說明會舉辦日期
- name: pd60_meettime
  type: varchar/time
  description: 說明會時間
  note: 說明會舉辦時間
- name: pd60_meetplace
  type: varchar
  description: 地點
  note: 說明會舉辦地點
- name: pd60_name
  type: varchar
  description: 標準團名
  note: 郵輪團名稱
- name: pd60_year
  type: varchar(4)/int
  description: 出發年度
  note: '團體出發年度 (如: 2025)'
- name: pd60_max
  type: int
  description: 開放人數
  note: 此說明會場次開放的報名人數上限
- name: pd60_mstfn
  type: varchar
  description: 維護者姓名及時區
  note: '單位+姓名+空格+時區 (如: 直團王大明 TW)'
- name: pd60_mdate
  type: datetime
  description: 當地維護時間
  note: 維護者所在時區的時間
