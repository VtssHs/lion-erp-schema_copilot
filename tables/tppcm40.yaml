table: tppcm40
database: LionGroupERP
module: 團體估價系統
aliases:
- 檔次報價總表
- tppcm40
- PCM40
- TPPCM40
description: 檔次報價總表。儲存各檔次的成本匯總與定價計算結果（同業價、直客價）
columns:
- name: tp40_tpform
  type: unknown
  fk_note: FK → `tppcm00.tp00_tpform`
  description: 估價代號
  note: '`tppcm00.tp00_tpform`'
- name: tp40_size
  type: unknown
  description: 檔次
  note: 值為 1~6，對應 tppcm30 的 cost1~6
- name: tp40_tot_amt
  type: unknown
  description: 總成本。原估價：總成本 = Local 總成本 + 其他總成本 新估價：總成本由產品人員自行輸入
  note: 每人總成本
- name: tp40_cost
  type: unknown
  description: 其他各項累計總成本/人。計算估價時，計算後回寫
  note: 非 Local 的其他成本
- name: tp40_local
  type: unknown
  description: Local 報價(含毛利)總成本。幣別為估價幣別 ★由 tppcm31 累計，已換算好匯率
  note: 地接社報價總額
- name: tp40_amt_w
  type: unknown
  description: '同業定價。總成本 × (1+(同業毛利%/(1-同業毛利%))) Ex: 總成本 10000 元，同業毛利 5%，直客毛利 8% 同業定價 = 10000 × (1+(0.05/1-0.05)) = 10526'
  note: 賣給旅行社同業的價格
- name: tp40_amt_d
  type: unknown
  description: 直客定價。同業定價 × (1+(直客毛利%/(1-直客毛利%))) 直客定價 = 10526 × (1+(0.08/1-0.08)) = 11442
  note: 賣給終端消費者的價格
- name: tp40_price
  type: unknown
  description: 估價單位報價
  note: 實際對外報價（可能基於同業價或直客價）
- name: tp40_git
  type: unknown
  description: 團員不含 Foc/TL
  note: 實際付費旅客人數
- name: tp40_foc
  type: unknown
  description: Foc
  note: Free of Charge，免費招待名額
- name: tp40_seat
  type: unknown
  description: 車型（座位數）
  note: 配車參考
