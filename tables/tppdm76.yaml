table: tppdm76
database: LionGroupERP
module: 團體產品系統 (Group Product)
aliases:
- 團產品預設圖檔
- tppdm76
- PDM76
- TPPDM76
description: 團產品預設圖檔。依線別與地區設定團體產品的預設圖片，新建團時自動套用
columns:
- name: pd76_seq
  type: int
  description: 流水序號
  note: IDENTITY(1,1) 自增值，從 1 開始
  pk: true
- name: pd76_line
  type: varchar(3)
  fk_note: FK → 線別代碼表，例如：歐洲線、美洲線
  description: 線別（主）
  note: 例如：歐洲線、美洲線
- name: pd76_dline
  type: varchar(3)
  fk_note: FK → 副線別代碼表，細分線別
  description: 線別（副）
  note: 細分線別
- name: pd76_area
  type: varchar(3)
  fk_note: FK → 地區代碼表，例如：西歐、東歐
  description: 地區（主）
  note: 例如：西歐、東歐
- name: pd76_darea
  type: varchar(3)
  fk_note: FK → 細地區代碼表，更細緻的地區分類
  description: 地區（副）
  note: 更細緻的地區分類
- name: pd76_picno
  type: varchar(100)
  description: 圖檔路徑或編號
  note: 可能是檔案路徑或圖檔管理系統的編號
- name: pd76_count
  type: int
  description: 取用次數
  note: 統計該預設圖被使用的次數
