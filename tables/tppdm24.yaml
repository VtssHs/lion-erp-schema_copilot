table: tppdm24
database: LionGroupERP
module: 團體產品系統 (Group Product)
aliases:
- 團體日行程CTO資料檔
- tppdm24
- PDM24
- TPPDM24
description: 團體日行程CTO資料檔。日行程的 CTO（Customer To Operator）景點、餐廳、旅館、商店資料
columns:
- name: pd24_tur2
  type: varchar
  fk: tppdm20.pd20_tur2
  description: 行程代號
  pk: true
- name: pd24_num
  type: int
  description: 流水號
  note: 對應 tppdm21.pd21_num（第幾天）
- name: pd24_cto
  type: varchar(10)
  description: CTO類別
  note: VIEW/MEAT/HOTEL/SHOP
- name: pd24_seq
  type: int
  description: 序號
  note: 同類別內的順序（1, 2, 3...）
- name: pd24_ctokey
  type: varchar
  fk_note: FK → 對應的主檔（景點/餐廳/旅館/商店）
  description: CTO資料代碼
  note: （景點/餐廳/旅館/商店）
- name: pd24_name
  type: nvarchar
  description: 顯示名稱
  note: 覆寫原始名稱時使用
- name: pd24_web
  type: varchar
  description: 外部網站聯結網址
  note: 景點官網、餐廳訂位網站等
- name: pd24_rowversion
  type: timestamp
  description: 時間戳記
  note: 新增時會自行產生，用於併發控制
