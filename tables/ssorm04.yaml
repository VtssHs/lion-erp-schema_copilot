table: ssorm04
database: LionGroupERP
module: 訂單管理系統 (Sales Order)
aliases:
- 訂單副檔
- ssorm04
- ORM04
- SSORM04
description: 訂單副檔。訂單刷卡期限管理、契約書回收與說明會文件追蹤
columns:
- name: or04_ordr
  type: varchar
  fk: ssorm00.ordr_ordr
  description: 訂單編號
  pk: true
- name: or04_year
  type: varchar
  fk: ssorm00.ordr_year
  description: 訂單年度
- name: or04_carddate
  type: datetime
  description: 刷卡期限
  note: 要換卡刷刷
- name: or04_mdate
  type: datetime
  description: 刷卡日期維護日
- name: or04_mstfn
  type: varchar
  description: 刷卡日期維護人
- name: or04_form
  type: bit
  description: 已收回契約書
  note: 1=已收回, 0=未收回
- name: or04_meet_read
  type: bit
  description: 已讀說明會文件
  note: 1=已讀, 0=未讀
- name: or04_meet_readtime
  type: datetime
  description: 說明會已讀時間
