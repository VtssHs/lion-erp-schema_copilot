table: tppcm00
database: LionGroupERP
module: 團體估價系統
aliases:
- 團體產品估價主檔
- tppcm00
- PCM00
- TPPCM00
description: 團體產品估價主檔。儲存團體產品的估價單主檔資料
columns:
- name: tp00_tpform
  type: unknown
  pk: true
  description: 估價代號。估價單唯一識別碼
- name: tp00_name
  type: unknown
  description: 估價名稱
- name: tp00_prodname
  type: unknown
  description: 標準團名
- name: tp00_kind
  type: unknown
  description: 類別。0-原估價 1-新估價
- name: tp00_fsts
  type: unknown
  description: 進度。空白-建置 F-估價完成 V-估價待核准尚未生效
- name: tp00_sts
  type: unknown
  description: 已作廢
- name: tp00_cxl
  type: unknown
  description: 報價結果無效。1-無效
- name: tp00_cxldesc
  type: unknown
  description: 報價無效原因
- name: tp00_prof
  type: unknown
  description: 團控單位
- name: tp00_rprof
  type: unknown
  description: 需求單位
- name: tp00_rstfn
  type: unknown
  description: 需求者員編
- name: tp00_tpstfn
  type: unknown
  description: 維護者員編。估價審核完成時留言通知的對象
- name: tp00_ffstfn
  type: unknown
  description: 報價者單位姓名時區。單位+姓名+空格+時區 ex:直團王大明 TW
- name: tp00_astfn
  type: unknown
  description: 審核者單位姓名時區。單位+姓名+空格+時區 ex:直團王大明 TW
- name: tp00_mstfn
  type: unknown
  description: 維護者單位姓名時區。單位+姓名+空格+時區 ex:直團王大明 TW
- name: tp00_line
  type: unknown
  description: 線別
- name: tp00_dline
  type: unknown
  description: 副線別
- name: tp00_area
  type: unknown
  description: 地區
- name: tp00_darea
  type: unknown
  description: 細地區。可空白
- name: tp00_days
  type: unknown
  description: 天數
- name: tp00_prodsts
  type: unknown
  description: 團型
- name: tp00_tl
  type: unknown
  description: '領隊人數。畫面def: 1'
- name: tp00_agent
  type: unknown
  description: 包團同行
- name: tp00_fdate
  type: unknown
  description: 出發起日
- name: tp00_tdate
  type: unknown
  description: 出發訖日
- name: tp00_ffdate
  type: unknown
  description: 報價日期
- name: tp00_adate
  type: unknown
  description: 審核日期。當地時間
- name: tp00_mdate
  type: unknown
  description: 當地維護日期
- name: tp00_msysdate
  type: unknown
  description: 主機維護日期
- name: tp00_curr
  type: unknown
  description: 估價幣別
- name: tp00_mult
  type: unknown
  description: 估價單位報價乘數%
- name: tp00_profit_d
  type: unknown
  description: 直客毛利%
- name: tp00_profit_w
  type: unknown
  description: 同業毛利%
- name: tp00_rpt
  type: unknown
  description: 報表小數位數。For 報表金額統一小數位數
- name: tp00_room_cto
  type: unknown
  description: 旅館單人價。有key旅館成本（國旅, InBound才會有）只參考不估價用
- name: tp00_room_cto_qty
  type: unknown
  description: 旅館單房差數量-人。★有上才有此欄
- name: tp00_room_local
  type: unknown
  description: Local報價總房間差。★有key Local單房間差（國旅, OutBound才會有）己換算好匯率
- name: tp00_room_local_qty
  type: unknown
  description: Local報價單房差數量-人。★有上才有此欄
- name: tp00_desc
  type: unknown
  description: 估價單位備註
- name: tp00_desc2
  type: unknown
  description: 估價說明。當估價毛利低於標準時,需填寫
