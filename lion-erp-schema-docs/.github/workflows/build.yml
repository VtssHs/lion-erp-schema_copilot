name: Build schemas from YAML

on:
  push:
    paths:
      - 'tables/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'tables/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lion-erp-schema-docs
        uses: actions/checkout@v4

      - name: Checkout lion-erp-schema-tools
        uses: actions/checkout@v4
        with:
          # TODO: 改成你的 GitHub org/user
          repository: YOUR_ORG/lion-erp-schema-tools
          path: _tools
          # 若 tools repo 是 private，需要設定 token：
          # token: ${{ secrets.TOOLS_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r _tools/requirements.txt

      - name: Build schemas
        run: python3 _tools/scripts/yaml_to_md.py --strict

      - name: Check quality
        run: python3 _tools/scripts/check_quality.py

      - name: Detect changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain schemas/)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit regenerated schemas
        if: steps.diff.outputs.has_changes == 'true' && github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add schemas/
          git commit -m "chore: regenerate schemas from YAML [skip ci]"
          git push

      - name: Fail if schemas drifted on PR
        if: steps.diff.outputs.has_changes == 'true' && github.event_name == 'pull_request'
        run: |
          echo "::error::schemas/ 與 tables/ 不同步。請在本地跑 'python3 scripts/yaml_to_md.py' 並 commit 結果。"
          exit 1
