table: tppdm11
database: LionGroupERP
module: 團體產品系統 (Group Product)
aliases:
- 出團行程檔
- tppdm11
- PDM11
- TPPDM11
description: 出團行程檔。記錄每個出團檔次的人數統計資料
columns:
- name: pd11_prod
  type: varchar
  fk: tppdm10.prod_prod
  description: 團號
  pk: true
- name: pd11_prodcomp
  type: varchar
  description: 團控公司
- name: pd11_hl
  type: int
  description: HL人數
  note: 不含 join，Inf 依 tppdm10.prod_infseat 決定
- name: pd11_qhk
  type: int
  description: 排HK人數
  note: 候補人數
- name: pd11_ob
  type: int
  description: OB人數
- name: pd11_hk
  type: int
  description: HK人數
- name: pd11_kk
  type: int
  description: KK人數
- name: pd11_act1
  type: int
  description: 大人人數(全部訂單含join)
  note: FOR 支出審核用
- name: pd11_act2
  type: int
  description: 小孩人數(全部訂單含join)
- name: pd11_act3
  type: int
  description: 嬰兒人數(全部訂單含join)
- name: pd11_tl
  type: int
  description: 領隊人數
  note: 價格條件=2
- name: pd11_foc
  type: int
  description: FOC人數
  note: 價格條件=3, Free of Charge
- name: pd11_tkt
  type: int
  description: 湊票人數不含Inf
  note: 價格條件=6
- name: pd11_join
  type: int
  description: Join人數
  note: 價格條件=7，Inf 依 tppdm10.prod_infseat 決定
- name: pd11_off
  type: int
  description: HKKK脫隊人數
  note: 已確認但脫隊的人數
- name: pd11_visa
  type: int
  description: OP收件人數
  note: OP已收件的人數統計
- name: pd11_hotel
  type: bit
  description: 小房子已讀
  note: OP 旅館配房完成標記
