table: tppdm12
database: LionGroupERP
module: 團體產品管理 (TPPDM)
aliases:
- 說明會副檔
- tppdm12
- PDM12
- TPPDM12
description: 說明會副檔。記錄每個出發團的說明會作業資料、領隊建議與核派流程、交班設定、報帳狀態，以及 AI 導領腳本/影片等補充設定
columns:
- name: pd12_prod
  type: varchar
  fk: tppdm10.prod_prod
  description: 團號
- name: pd12_prodcomp
  type: varchar
  description: 團控公司
- name: pd12_rc
  type: varchar
  description: 指派者姓名
  note: 例：王大明
- name: pd12_rcdate
  type: datetime
  description: 指派日期
- name: pd12_op
  type: varchar
  description: 接團 OP 員編
- name: pd12_opdate
  type: datetime
  description: OP 接團確認日期
- name: pd12_meet
  type: varchar
  description: 要辦理說明會
  note: 0=不辦理，1=要辦理
- name: pd12_meetname
  type: varchar
  description: 說明會文件用行程內部名稱
  note: 0=tptbm00_b2cname，1=tppdm20.pd20_dname 用行程內部名
- name: pd12_meetdate
  type: datetime
  description: 說明會時間
- name: pd12_meetplace
  type: varchar
  fk_note: FK → Istbm00 (MEET)
  description: 說明會地點
- name: pd12_meetshowblock
  type: varchar
  description: 顯示區塊
  note: 多值設定，見代碼說明
- name: pd12_meetdesc
  type: varchar
  description: 備註 & 視訊連結
- name: pd12_rop
  type: varchar
  description: 說明會文件送審者姓名
  note: 例：王大明
- name: pd12_rdate
  type: datetime
  description: 說明會文件送審日
- name: pd12_frc
  type: varchar
  description: 說明會審查者姓名
  note: 例：王大明
- name: pd12_fdate
  type: datetime
  description: 說明會審查日期
- name: pd12_fop
  type: varchar
  description: 說明會資料產生 HTML
- name: pd12_fcnt
  type: int
  description: 說明會資料重送審次數
- name: pd12_pdf
  type: varchar
  description: 說資產生 pdf 檔
- name: pd12_sugg
  type: varchar
  description: 建議領隊者員編
- name: pd12_suggstfn
  type: varchar
  description: 建議領隊者姓名
  note: 例：王大明
- name: pd12_suggdate
  type: datetime
  description: 建議日期
- name: pd12_suggtl
  type: varchar
  description: 建議領隊編號
- name: pd12_suggtlsta
  type: varchar
  description: 建議領隊身份
  note: 空白=專業，1=員工，2=同行借調
- name: pd12_suggtlname
  type: varchar
  description: 建議領隊姓名
- name: pd12_suggdesc
  type: varchar
  description: 建議備註說明
- name: pd12_tl_sex
  type: varchar
  description: 建議領隊性別
  note: 空白=不限，M=男，F=女
- name: pd12_tl_tg
  type: varchar
  description: T/G（Through Guide）
- name: pd12_tl_sg
  type: varchar
  description: S/G（Shopping Guide）
- name: pd12_app
  type: varchar
  description: 核派領隊者員編
- name: pd12_appstfn
  type: varchar
  description: 核派領隊者姓名
  note: 例：王大明
- name: pd12_appdate
  type: datetime
  description: 核派日期
- name: pd12_apptl
  type: varchar
  description: 核派領隊編號
- name: pd12_apptlsta
  type: varchar
  description: 核派領隊身份
  note: 空白=專業，1=員工，2=同行借調
- name: pd12_apptlname
  type: varchar
  description: 核派領隊姓名
- name: pd12_appdesc
  type: varchar
  description: 核派備註說明
- name: pd12_year
  type: varchar
  description: 核派領隊訂單年
- name: pd12_order
  type: varchar
  description: 核派領隊訂單編號
- name: pd12_agent_year
  type: varchar
  description: 同行派領隊的訂單年
  note: 因同行訂單人數較多故派其領隊，尚未有查詢功能
- name: pd12_agent_order
  type: varchar
  description: 同行派領隊的訂單編號
- name: pd12_agent_tlname
  type: varchar
  description: 同行派領隊姓名
- name: pd12_shift
  type: varchar
  description: 交班
- name: pd12_shift_stfn
  type: varchar
  description: (交班) 代理者員編
- name: pd12_color
  type: varchar
  description: 識別證顏色
- name: pd12_godate1
  type: datetime
  description: 日期時間
  note: 出團單位的集合資料
- name: pd12_airport1
  type: varchar
  description: 機場代號
- name: pd12_gocarr1
  type: varchar
  description: 航空公司櫃台
- name: pd12_tel1
  type: varchar
  description: 聯絡電話
- name: pd12_godesc
  type: varchar
  description: 備註說明
- name: pd12_telmemo
  type: varchar
  description: 舊版領電話說明
- name: pd12_reim
  type: varchar
  description: 需領隊報帳
  note: 依線別+單位預設，亦可由會計設定
- name: pd12_reim_fdate
  type: datetime
  description: 結帳完成日
- name: pd12_reim_ac
  type: varchar
  description: 結帳維護者單位姓名時區
  note: 格式：單位+姓名+空格+時區
- name: pd12_reim_mdate
  type: datetime
  description: 結帳維護時間
- name: pd12_reim52
  type: varchar
  description: 52 支單需領隊報帳
  note: 52 支單由日處理判斷是否領隊結帳
- name: pd12_reim52_fdate
  type: datetime
  description: 52 支單結帳完成日
- name: pd12_assistant_script
  type: varchar
  description: 導領腳本代碼
- name: pd12_assistant_video
  type: varchar
  description: 說資影片檔名
- name: pd12_assistant_url
  type: varchar
  description: 說資 Q&A 網址
- name: pd12_assistant_stfn
  type: varchar
  description: 發送通知人
- name: pd12_assistant_date
  type: datetime
  description: 發送通知時間
- name: pd12_assistant_pstfn
  type: varchar
  description: 送出影片人
- name: pd12_assistant_pdate
  type: datetime
  description: 送出影片時間
- name: pd12_assistant_psts
  type: varchar
  description: 送出影片狀態
- name: pd12_mstfn
  type: varchar
  description: 說明會資料維護者單位姓名時區
  note: 格式：單位+姓名+空格+時區，例：`直團王大明 TW`
- name: pd12_mdate
  type: datetime
  description: 當地維護日期
- name: pd12_msysdate
  type: datetime
  description: 主機時間
- name: pd12_tlmstfn
  type: varchar
  description: 設定領隊資料維護者單位姓名時區
  note: 格式同上
- name: pd12_tlmdate
  type: datetime
  description: 設定領隊維護日期
