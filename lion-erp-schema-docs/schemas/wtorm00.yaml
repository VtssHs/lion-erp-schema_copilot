table: wtorm00
database: LionGroupERP
module: 網位單管理系統 (Web Transaction Order)
aliases:
- 訂位單主檔
- 網位單管理系統
- 網位單的主檔
- wtorm00
- WTORM00
description: 訂位單主檔。網位單（網路訂位單）的主檔，涵蓋機票、自由行、訂房、票券、高鐵等多種訂單型態的共用主檔結構
columns:
- name: Wor00_ordr
  type: varchar
  pk: true
  description: ERP訂位單編號
- name: Wor00_year
  type: varchar
  pk: true
  description: ERP訂位單年碼
- name: Wor00_wtordr
  type: varchar
  description: 訂位單編號
- name: Wor00_wtyear
  type: varchar
  description: 訂位單年碼
  note: ＊每種訂單不同使用
- name: Wor00_oldsn
  type: varchar
  description: 舊訂單編號
- name: Wor00_fsts
  type: varchar
  description: 訂單型態
  note: 空白=訂位; 2=B2B開票; 3=自由行; 7=新自由行; 4=訂房; 8=券; 9=搶購單; 6=估價; A=高鐵票
- name: Wor00_fsts2
  type: varchar
  description: 訂單次型態/付款方式
  note: '機票: 1=立即網刷並開票 2=客人自行開票 3=業務自行開票; 自由行: T=B2B有Pnr請雄獅代開票; 訂房: 0=保證住房 1=保留房（有值=應立即付款，滿1hr無網刷則自動cxl）'
- name: Wor00_sts
  type: bit
  description: 已取消
- name: Wor00_sts1
  type: varchar
  description: 人工需求單
- name: Wor00_flow
  type: varchar
  description: 處理進度
  note: 空白=未處理; 1=處理中; F=處理完成; G=開票
- name: Wor00_opsts
  type: varchar
  description: OP處理進度
  note: Null=業務可改; F=產品部處理中（產品資料不可改）
- name: Wor00_close
  type: bit
  description: 已關閉前台查詢
  note: 因客戶要求關閉前台訂單查詢
- name: Wor00_date
  type: datetime
  description: 下單時間
- name: Wor00_fdate
  type: datetime
  description: 出發日 / 入住日
- name: Wor00_sdate
  type: datetime
  description: 出發日
  note: 機票/訂房 sdate=fdate; 自由行 sdate=交通段出發日
- name: Wor00_tdate
  type: datetime
  description: 回程日 / 退房日
- name: Wor00_chkdate
  type: datetime
  description: 機票開票期限
  note: 依下單及出發日計算最晚應開票日；出發-下單日 0~7天=下單日+3天；8~30天=下單日+7天；31天以上=出發日-20天；超期未完成由日處理自動CXL單及PNR
- name: wor00_cxldate
  type: datetime
  description: 取消時間
- name: Wor00_con_name
  type: varchar
  description: 聯絡人姓名
- name: Wor00_idno
  type: varchar
  description: 聯絡人身份證
- name: Wor00_con_email
  type: varchar
  description: E-mail
- name: Wor00_con_mtel
  type: varchar
  description: 行動電話
- name: Wor00_con_tel
  type: varchar
  description: 公司電話-電話號碼
- name: Wor00_con_tel_1
  type: varchar
  description: 公司電話-城市區碼
- name: Wor00_con_tel_3
  type: varchar
  description: 公司電話-分機
- name: Wor00_con_tel_country
  type: varchar
  description: 電話國碼
  note: 全球訂單時使用
- name: Wor00_con_tel2
  type: varchar
  description: 住家電話-電話號碼
- name: Wor00_con_tel2_1
  type: varchar
  description: 住家電話-城市區碼
- name: wor00_con_fax
  type: varchar
  description: 傳真
- name: Wor00_act1
  type: int
  description: 大人人數 ＊
  note: '訂房: night數×房數=總RN'
- name: Wor00_act2
  type: int
  description: 小孩人數 ＊
  note: '訂房: night數'
- name: Wor00_act3
  type: int
  description: 嬰兒人數
  note: '訂房: 以下欄位皆無用'
- name: Wor00_act4
  type: int
  description: 老人人數
- name: Wor00_foc
  type: int
  description: FOC人數
- name: wor00_qty
  type: varchar
  description: 數量
  note: '格式各產品前後台統一即可；Ex: 訂房「2間1晚」；也可存入產品名'
- name: Wor00_amt
  type: decimal
  description: 未含稅及加價金額
  note: '自由行: 訂單小計（未扣退佣）'
- name: Wor00_tot_amt
  type: decimal
  description: 總金額
  note: '自由行: 總金額 = amt – discount – add_amt1'
- name: wor00_tot_amt2
  type: decimal
  description: 設定網刷金額
  note: '高鐵: 總金額 = amt – discount'
- name: Wor00_discount
  type: decimal
  description: 折扣
  note: '自由行: 同行退佣；高鐵: 刷卡折扣金額（折扣1應為明細檔加總）'
- name: wor00_discount2
  type: decimal
  description: 折扣 2
  note: 整張訂單行銷折扣，只記錄在 head，總金額再減折扣2
- name: wor00_ecash
  type: decimal
  description: 抵用 ecash 金額
  note: 自由行使用，總金額不含 ecash
- name: Wor00_tax1
  type: decimal
  description: 機場稅金
- name: Wor00_tax2
  type: decimal
  description: 兵險稅金 / 高鐵折扣
  note: 高鐵專案兆豐卡9折優惠價
- name: Wor00_tax3
  type: decimal
  description: 燃料稅金
- name: Wor00_add_amt1
  type: decimal
  description: 週末加價
  note: '自由行: 其他加價小計'
- name: Wor00_add_amt2
  type: decimal
  description: 月票加價
- name: Wor00_add_amt3
  type: decimal
  description: 年票加價
- name: Wor00_add_amt4
  type: decimal
  description: 期間加價
- name: Wor00_cost
  type: decimal
  description: 成本
  note: 票單轉線8時有值
- name: Wor00_cost2
  type: decimal
  description: 成本2
  note: 用途待確認
- name: Wor00_cost2_curr
  type: varchar
  description: 成本2幣別
  note: 用途待確認
- name: Wor00_paykind
  type: varchar
  description: 付款方式
  note: A=ATM; B=收到切結書; D=線上切結; C=線上刷卡; F=傳真刷卡; 4=分期; T=匯款（目前只有B2B For經案有假的）; P=到店付款
- name: wor00_payment_desc
  type: varchar
  description: 設定網刷金額說明
  note: 業務開放前台網刷金額不同時給 B2C 看的說明
- name: Wor00_getticket
  type: varchar
  description: 取票方式
  note: M=掛號; P=親自; D=快遞; R=到站自取
- name: Wor00_etkt
  type: varchar
  description: 電子機票
  note: 1=開
- name: wor00_name
  type: varchar
  description: 產品名稱
  note: 名稱及數量供前後台訂單查詢用，不再 JOIN 產品檔；轉線8要存入
- name: Wor00_op
  type: varchar
  description: 產品OP
- name: Wor00_prodprof
  type: varchar
  description: 產品單位
- name: Wor00_prof
  type: varchar
  description: 單位
- name: wor00_key1
  type: unknown
  description: 對應其他檔KEY
- name: wor00_key2
  type: unknown
  description: 對應其他檔KEY
- name: wor00_key3
  type: unknown
  description: 對應其他檔KEY
- name: wor00_key4
  type: unknown
  description: 對應其他檔KEY
- name: wor00_key5
  type: unknown
  description: 對應其他檔KEY
- name: Wor00_webcode
  type: varchar
  description: 來源
  note: null=ERP後台/電話單
- name: Wor00_ordrin1
  type: varchar
  fk_note: FK → Istbm00 (ORDRIN1)
  description: 報名方式
  note: ；app下單時記錄手機廠牌
- name: Wor00_ordrin2
  type: varchar
  fk_note: FK → Istbm00 (ORDRIN2)
  description: 客人來源
- name: Wor00_tourist_origin
  type: varchar
  description: 客源地
  note: 2024/03/29 新增（申請單 24031627）
- name: Wor00_ip
  type: varchar
  description: 下單IP
  note: 過陣子可清除
- name: wor00_member_uid
  type: varchar
  description: 會員UID
- name: wor00_b2bpoint
  type: decimal
  description: B2B點數
- name: Wor00_agent
  type: varchar
  description: 同行代碼
  note: 非B2B、B2E 時使用 U20083
- name: wor00_bu
  type: varchar
  fk: isbum00
  description: 雄獅BU訂單
- name: Wor00_comp
  type: varchar
  description: 公司
- name: Wor00_comp2
  type: varchar
  description: 物流公司
  note: 當自取時可設定
- name: Wor00_pcc
  type: varchar
  description: 區域號碼
- name: Wor00_sales
  type: varchar
  description: 業務人員
- name: Wor00_crs
  type: varchar
  fk_note: FK → Istbm00 (CRSKIND)
  description: 訂位系統
- name: Wor00_pnr
  type: varchar
  description: PNR代號
- name: Wor00_carr
  type: varchar
  description: 航空公司
- name: Wor00_open
  type: varchar
  description: 回程OPEN
  note: 1=開OPEN
- name: Wor00_table
  type: varchar
  description: 票價編號
  note: 機票訂單已改用 wor00_key2
- name: Wor00_tyear
  type: varchar
  description: 票價年碼
  note: 機票訂單已改用 wor00_key1
- name: wor00_jordr
  type: varchar
  description: 對接平台商代號
- name: wor00_jsts
  type: varchar
  description: 預訂狀態
  note: GTA/HC用代碼；德比用英文敘述
- name: wor00_jtime
  type: datetime
  description: 預訂時間
  note: Log記錄
- name: wor00_pordr
  type: varchar
  description: 供應商訂單編號 / 預訂單號
  note: 訂房對接；null=尚未對接；空白=開始預訂；其他值=預訂完成；GTA/HC 用 int；德比為英數夾雜
- name: Wor00_tkproj
  type: varchar
  description: 專案代碼
  note: 機票專案/訂房行銷活動/高鐵刷卡專案代碼；0030000=兆豐卡
- name: Wor00_tkproj_sts
  type: varchar
  description: 機票狀況 / 訂房保留房通知
  note: '訂房: 若有保留房於時限內網刷後以 mail 通知供應商時上 mark'
- name: Wor00_tkproj2
  type: varchar
  description: 專案代碼2
  note: '訂房: 網站下單為對接房時 set「對接」；會員訂單則不 show 付款連結'
- name: Wor00_usp
  type: varchar
  description: USP註記
  note: '訂房: 由 usp 折扣活動頁進入；自由行住宿券: 0=未確認; 1=已確認'
- name: wor00_cxldesc
  type: varchar
  fk_note: FK → istbm00 (CXLDESC)
  description: 取消原因代碼
- name: wor00_cxldesc2
  type: varchar
  fk_note: FK → istbm00 (CXLDESC2)
  description: 未執行自行開票原因
- name: wor00_cxlstfn
  type: varchar
  description: 取消人
  note: 因開放B2B可作廢，故增加記錄
- name: wor00_apis
  type: unknown
  description: 已無用
- name: wor00_chktime
  type: unknown
  description: 已無用
- name: wor00_seat
  type: unknown
  description: 已無用
- name: xWor00_tkproj_desc
  type: unknown
  description: 機票說明（已無用）
- name: xWor00_tkproj_item
  type: unknown
  description: 機票項目（已無用）
