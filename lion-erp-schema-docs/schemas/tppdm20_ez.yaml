table: tppdm20_ez
database: LionGroupERP
module: 團體產品系統 (Group Product)
aliases:
- 易遊行程主檔
- tppdm20_ez
- PDM20_EZ
- TPPDM20_EZ
description: 易遊行程主檔。易遊系統的行程範本（可供多個團體使用）
columns:
- name: ez20_tur2
  type: varchar(20)
  description: 行程代號
  note: 唯一識別碼
  pk: true
- name: ez20_sts
  type: bit
  description: 已下架
  note: 1=不要轉匯至易遊
- name: ez20_zpsts
  type: varchar(10)
  description: ？？
  note: 用途待確認
- name: ez20_line
  type: varchar(10)
  description: 易遊線別代碼
  note: 對應易遊系統的線別分類
- name: ez20_area
  type: varchar(10)
  description: 易遊區域代碼
  note: 對應易遊系統的區域分類
- name: ez20_country
  type: varchar(10)
  description: 易遊國家代碼
  note: 對應易遊系統的國家分類
- name: ez20_city
  type: varchar(50)
  description: 易遊旅遊城市群代碼
  note: 多個城市代碼組合
- name: ez20_city_dname
  type: nvarchar(200)
  description: 易遊旅遊城市說明
  note: 城市群的說明文字
- name: ez20_mstfn
  type: varchar(50)
  description: 維護者姓名及時區
  note: 單位+姓名+空格+時區 ex:直團王大明 TW
- name: ez20_mdate
  type: datetime
  description: 維護時間
  note: 當地維護日期
