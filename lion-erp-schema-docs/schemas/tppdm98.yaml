table: tppdm98
database: LionGroupERP
module: 團體產品系統 (Group Product)
aliases:
- 團多房價群組檔
- tppdm98
- PDM98
- TPPDM98
description: 團多房價群組檔。管理同一團號下的多種房型價格方案，支援不同旅館組合與銷售方案
columns:
- name: pd98_prod
  type: varchar(10)
  fk: tppdm10.prod_prod
  description: 團號
  note: '**PK1**'
  pk: true
- name: pd98_prodcomp
  type: varchar(2)
  description: 團控公司
- name: pd98_no
  type: int
  description: 序號
  note: '**PK2**, 同一團號下的房價方案編號'
- name: pd98_hotel
  type: varchar(10)
  fk_note: FK → 旅館主檔，該方案主要使用的旅館
  description: 旅館代碼
  note: 該方案主要使用的旅館
- name: pd98_salename
  type: nvarchar(100)
  description: 銷售方案名稱
  note: 前台顯示名稱，例如：「五星尊榮」「經典商務」
- name: pd98_sort
  type: int
  description: 排序
  note: 前台顯示順序，數字越小越前面
- name: pd98_sts
  type: bit
  description: 是否滿位
  note: 1=已滿位, 0=尚有空位
- name: pd98_mstfn
  type: varchar(20)
  fk_note: FK → 員工主檔
  description: 維護人員編
- name: pd98_mdate
  type: datetime
  description: 維護時間
  note: 最後修改時間
