table: ssorm05
database: LionGroupERP
module: 訂單管理系統 (Sales Order)
aliases:
- 各產品網單同意記錄檔
- ssorm05
- ORM05
- SSORM05
description: 各產品網單同意記錄檔。記錄客戶於網路下單時對報名需知、旅遊契約書、個資同意等項目的確認記錄
columns:
- name: or05_ordr
  type: varchar
  fk: ssorm00.ordr_ordr
  description: 訂單(網位單)編號
  note: 團單 ; 非團單產品
- name: or05_year
  type: varchar
  pk: true
  description: 訂單(網位單)年度
- name: or05_type
  type: varchar
  description: 同意項目
  note: 空白=報名需知&旅遊契約書, 1=個資確認
- name: or05_time
  type: datetime
  description: 同意時間
  note: 記錄客人同意須知時間
