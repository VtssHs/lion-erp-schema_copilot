- name: or07_code
  type: varchar
  fk_note: FK → istbm81 (CHECKLIST)
  description: 檢核類別
- name: or07_item
  type: varchar
  pk: true
  description: 檢核項目
- name: or07_sts
  type: varchar
  description: 已確認
  note: 0=未確認, 1=已確認
- name: or07_desc
  type: varchar
  description: 備註說明
  note: 補充說明或異常記錄
- name: or07_mstfn
  type: varchar
  description: 維護人
  note: 最後確認的業務人員
- name: or07_mdate
  type: datetime
  description: 維護日
  note: 最後確認時間
