table: tppdm10
database: LionGroupERP
module: 團體產品系統 (Group Product)
aliases:
- 團體主檔
- tppdm10
- PDM10
- TPPDM10
description: 團體主檔。一個出發日的團體資料（核心主檔）
columns:
- name: prod_prod
  type: varchar
  pk: true
  description: 團號
- name: prod_prodcomp
  type: varchar
  description: 團控公司
- name: prod_line
  type: varchar
  description: 線別
- name: prod_dline
  type: varchar
  description: 副線別
- name: prod_days
  type: int
  description: 天數
- name: prod_0hotel
  type: bit
  description: 夜未眠
  note: 1=夜未眠行程，前台等同1天local行程，應無旅館檔資料
- name: prod_area
  type: varchar
  description: 地區
- name: prod_darea
  type: varchar
  description: 細地區
- name: prod_name
  type: varchar
  description: 標準團名
- name: prod_b2pname
  type: varchar
  description: 企業(B2P)團名
  note: 給內部看如:景文美東; 國旅9z 加show前台
- name: prod_project
  type: varchar
  fk: istbm00
  description: 專案代號
- name: prod_tur2
  type: varchar
  description: 行程編號
- name: prod_html_date
  type: datetime
  description: 行程更新異動時間
  note: Null=表示尚未產生行程網頁
- name: prod_sts
  type: char(1)
  description: 團型
  note: 1=outb團, 2=票團, 3=外丟, 4=商務, 5=Inb, 6=Local
- name: prod_full
  type: char(1)
  description: 團控狀況
  note: C=結, L=鎖, M=挪, V=取消
- name: prod_ctrl
  type: varchar
  description: 團控說明
  note: U=急, G=必走（存檔以中文存入）
- name: prod_go
  type: bit
  description: 保證出團
  note: 1=保證出團
- name: prod_packairp
  type: bit
  description: 包機團
  note: 當包機時等同保證出團，故設保證出團=1
- name: prod_grouptype
  type: char(1)
  description: 團類別
  note: S=系列團, C=客製團
- name: prod_down
  type: bit
  description: 直客可降售價
  note: 不能down價時，前台show特惠
- name: prod_downa
  type: bit
  description: 同業可降售價
- name: prod_amt_w
  type: decimal
  description: 大人批售價
  note: 由tppdm90 io存入，以便search少join
- name: prod_amt_d
  type: decimal
  description: 大人直售價
- name: prod_minamt_w
  type: decimal
  description: 最低大人批售價
- name: prod_minamt_d
  type: decimal
  description: 最低大人直客價
- name: prod_fsts
  type: bit
  description: 售價審核
  note: 0=系統審核, 1=主管審核（主管審核過的不可複製）
- name: prod_unpriced
  type: bit
  description: 售價未定
  note: 售價未定時後台顯示「未定」，前台顯示「近期上架」
- name: prod_pay
  type: decimal
  description: 訂金
  note: 由tppdm90搬過來 pd90_pay
- name: prod_payfull
  type: bit
  description: 需全額付清(才能kk)
  note: 由tppdm90搬過來 pd90_payfull
- name: prod_payment
  type: bit
  description: 可信用卡分期付款
  note: show ╳:不可分期
- name: prod_gmode3
  type: bit
  description: 須立即付款
  note: 由pd16_gmode3 move，海外本次改show！:須立即付款，4Hr拉hk
- name: prod_isnotax
  type: bit
  description: 為未稅價格
- name: prod_gst_rate
  type: decimal
  description: 團GST稅率
- name: prod_gst_mdate
  type: datetime
  description: 團GST稅率更新日
- name: prod_viporigprice
  type: decimal
  description: 會員限購原價
- name: prod_groupvisa
  type: bit
  description: 辦團簽
- name: prod_option
  type: bit
  description: 有自費活動
  note: Local團用，可選擇出發前選購
- name: prod_d0
  type: date
  description: 實際成團日
  note: FOR RC check報名人數，MSG TO業務收訂，當空白時未收款
- name: prod_d1
  type: date
  description: 報名截止
- name: prod_d2
  type: date
  description: 團簽截止
- name: prod_d4
  type: date
  description: 預計開票日
- name: prod_d5
  type: date
  description: 實際開票日
- name: prod_paydate1
  type: date
  description: 付訂提醒日期1
- name: prod_paydate2
  type: date
  description: 付訂提醒日期2
- name: prod_d6
  type: date
  description: 訂團日
- name: prod_d62
  type: date
  description: 訂團日2
- name: prod_d7
  type: date
  description: 海外公司接團日
  note: 當台灣上訂團日，海外就可select到，同時在團旅館資料上接團日
- name: prod_d72
  type: date
  description: 海外公司接團日2
  note: 海外接團開團時自動回寫
- name: prod_d8
  type: date
  description: 出團日期
- name: prod_d9
  type: date
  description: 回國日期
- name: prod_taxdate
  type: date
  description: 立帳日期
  note: 日處理凌晨撈當日回國的團寫入稅帳日=d9 (2012/05/31前為D8)；有對應outb團的inb團立帳日與outb團同；由台北會計副理級以上可做修改
- name: prod_obj1
  type: bit
  description: 不可銷售
  note: 1=團費不符合估價，不可銷售
- name: prod_obj2
  type: bit
  description: 銷售對象-會員
- name: prod_obj3
  type: bit
  description: 銷售對象-企業b2p
- name: prod_obj4
  type: bit
  description: 銷售對象-同行b2b
- name: prod_obj5
  type: bit
  description: 銷售對象-內部
- name: prod_obj6
  type: bit
  description: 銷售渠道BBC
- name: prod_obj7
  type: bit
  description: 銷售-會員限購
- name: prod_sfcountry
  type: varchar
  description: 前台搜尋-出發國家代碼
  note: Inb團交付的agent所在國城，提供經營分析用
- name: prod_sfcity1
  type: varchar
  description: 前台搜尋-出發城市代碼1
- name: prod_sfcity2
  type: varchar
  description: 前台搜尋-出發城市代碼2
- name: prod_sfcity3
  type: varchar
  description: 前台搜尋-出發城市代碼3
- name: prod_sfcity4
  type: varchar
  description: 前台搜尋-出發城市代碼4
- name: prod_sfcity5
  type: varchar
  description: 前台搜尋-出發城市代碼5
- name: prod_webarea
  type: varchar
  fk: Tptbm20.tb20_webarea
  description: 前台目的地
  note: BI分析用
- name: prod_form
  type: varchar
  fk_note: FK → Istbm00 (FORM)
  description: 旅遊契約書
- name: prod_cform
  type: varchar
  description: 艙房訂購合約書代碼
- name: prod_bu
  type: varchar
  description: 團控集團
- name: prod_country
  type: varchar
  description: 團控雄獅
- name: prod_prof
  type: varchar
  description: 團控單位
- name: prod_tprof
  type: varchar
  description: 機票單位
- name: prod_tagent
  type: varchar
  description: 機票外調法人代碼
- name: prod_carr
  type: varchar
  description: 機票航空公司
- name: prod_njprof
  type: varchar
  description: 包團單位
- name: prod_njhagent
  type: varchar
  description: 包團法人代碼
  note: 現在是agent-code opagm00，原本是opagm05
- name: prod_bprof
  type: varchar
  description: 接團單位
- name: prod_bprof2
  type: varchar
  description: 接團單位2
- name: prod_local1
  type: varchar
  description: LOCAL代號1
- name: prod_local2
  type: varchar
  description: LOCAL代號2
- name: prod_max
  type: int
  description: 團位
- name: prod_min
  type: int
  description: 追加機位
- name: prod_qhk
  type: int
  description: 可候補
  note: 額滿有候補數，排HK<可候補人數時，前台出現【候補】可下單
- name: prod_tl
  type: int
  description: 領隊人數
  note: 出團至少要一人
- name: prod_base
  type: int
  description: 成團機位數
  note: For團票最低開票機位量，檢核時不含join，再配合成團日
- name: prod_pak
  type: int
  description: PAK團人數
- name: prod_keep
  type: int
  description: 保留團人數
- name: prod_infseat
  type: bit
  description: 嬰兒佔團位
- name: prod_offrate
  type: decimal
  description: 脫隊成團人數%
  note: for機位控管用
- name: prod_offmax
  type: int
  description: 脫隊最多人數
- name: prod_tp
  type: varchar
  description: TP員編
- name: prod_rc
  type: varchar
  description: RC員編
  note: 開團者，可修改，主要接MSG
- name: prod_team
  type: varchar
  description: 團體組別
  note: 售價審核完成時留言通知的對象
- name: prod_tpstfn
  type: varchar
  description: 異動者員編
  note: 基本資料及售價增修時寫入，審核售價時不可審核自己增修的團
- name: prod_stopq
  type: bit
  description: OP鎖Q
- name: prod_qop
  type: bit
  description: Q信箱提醒OP
- name: prod_lock
  type: bit
  description: 財務鎖團帳
- name: prod_okname
  type: date
  description: 入名單日
  note: 當重入名單日後，訂單明細旅客的異動欄會清空，重新再記異動項；異動的記錄logssorm10
- name: prod_okroom
  type: date
  description: 分房完成日
- name: prod_itin
  type: bit
  description: itin表維護
  note: itin備註存檔回寫
- name: prod_okitin
  type: bit
  description: itin表完成
  note: itin備註勾完成回寫，勾完成或完成取消皆會通知outB OP
- name: prod_opairfg
  type: varchar
  description: OP面交送機人員勾選信息
- name: prod_ok19
  type: bit
  description: 完成滿意度計算
  note: 計算完成後回寫 true
- name: prod_re19
  type: bit
  description: 重新計算滿意度
  note: 1=本團意調表有更新存檔；當1時日處理須重新計算本團滿意度，計算後歸0
- name: prod_mstfn
  type: varchar
  description: 增修者單位姓名時區
  note: 單位+姓名+空格+時區 ex:直團王大明 TW
- name: prod_mdate
  type: datetime
  description: 當地增修日期
- name: prod_msysdate
  type: datetime
  description: 主機增修時間
- name: prod_tpform
  type: varchar
  fk: tppcm40
  description: 估價代號
- name: prod_size
  type: varchar
  fk: tppcm40
  description: 估價檔次
- name: prod_requ
  type: varchar
  description: 需求代碼
  note: 關聯需求單號
