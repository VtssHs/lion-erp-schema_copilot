table: tppcm41
database: LionGroupERP
module: 團體估價系統
aliases:
- 檔次成本明細檔
- tppcm41
- PCM41
- TPPCM41
description: 檔次成本明細檔。儲存各檔次中各成本項目的明細金額（機票、旅館、餐食等分項成本）
columns:
- name: tp41_tpform
  type: unknown
  fk_note: FK → `tppcm00.tp00_tpform`
  description: 估價代號
  note: '`tppcm00.tp00_tpform`'
- name: tp41_size
  type: unknown
  description: 檔次
  note: 1~6，對應不同人數檔次
- name: tp41_tpcost
  type: unknown
  description: 項目。同 tppcm10
  note: 對應 `tppcm10.tp10_tpcost`，如：機票、旅館、餐食
- name: tp41_name
  type: unknown
  description: 項目名。不是 tppcm10 來的沒有名稱，計算時要回寫，否則看不出啥項目 ZCar-車資*, zRoom-單房間差*（因要擺最下頭）
  note: 計算後回寫
- name: tp41_cost
  type: unknown
  description: 各項累計成本/人。計算時，計算後回寫
  note: 每人分攤的項目成本
