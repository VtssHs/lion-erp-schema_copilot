table: ssorm01
database: LionGroupERP
module: 訂單管理系統 (Sales Order)
aliases:
- 訂單副檔
- ssorm01
- ORM01
- SSORM01
description: 訂單副檔。訂單處理流程、會計入帳、授權控管與作業進度追蹤
columns:
- name: or01_ordr
  type: varchar
  fk: ssorm00.ordr_ordr
  description: 訂單編號
  pk: true
- name: or01_year
  type: varchar
  fk: ssorm00.ordr_year
  description: 訂單年度
- name: or01_sts
  type: varchar
  description: 處理狀況
  note: A=會計延時HK時間, R=RC, S=業務暫停拉HK處理
- name: or01_desc
  type: varchar
  description: 處理備註
- name: or01_prof
  type: varchar
  description: 處理單位
- name: or01_kk_time
  type: datetime
  description: 原訂單HK時間
  note: 處理時，將原訂單 Ordr_hk_time 欄記錄到本欄
- name: or01_kk_accdate
  type: datetime
  description: 出納入帳kk日期
  note: 會計延HK及線控授權KK記錄，及訂單KK日期
- name: or01_autorec
  type: bit
  description: HK訂單自動入帳
  note: 付款方式為信用卡且為HK團單，業務可勾選，日處理固定跑自動入帳
- name: or01_ename_err
  type: int
  description: 團單未入名單累計不合格人次
  note: (含)8人以下，出納KK日+2工作日的1800計數
- name: or01_pd98no
  type: varchar
  description: 團單房價群組代號
  note: 新增 2023/06/21
- name: or01_pd98nomstfn
  type: varchar
  description: 房價群組代號維護人
  note: 新增 2023/06/21
- name: or01_pd98nomdate
  type: datetime
  description: 房價群組代號維護日
  note: 新增 2023/06/21
- name: or01_tdate
  type: datetime
  description: 訂單修改期限日
  note: 新增 2025/09/26
- name: or01_vstfn
  type: varchar
  description: 訂單取消者
  note: 新增 2023/03/23
- name: or01_vdate
  type: datetime
  description: 訂單取消日
  note: 新增 2023/03/23
- name: or01_prodlock
  type: bit
  description: 訂單作業鎖定
  note: 新增 2023/06/21
- name: or01_prodlockmstfn
  type: varchar
  description: 作業鎖定維護人
  note: 新增 2023/06/21
- name: or01_prodlockmdate
  type: datetime
  description: 作業鎖定維護日
  note: 新增 2023/06/21
- name: or01_bookflow
  type: varchar
  description: 訂單作業進度
  note: 新增 2023/06/21
- name: or01_bookflowmstfn
  type: varchar
  description: 作業進度維護人
  note: 新增 2023/06/21
- name: or01_bookflowmdate
  type: datetime
  description: 作業進度維護日
  note: 新增 2023/06/21
- name: or01_mdate
  type: datetime
  description: 處理(當地)時間
- name: or01_msysdate
  type: datetime
  description: 主機時間
- name: or01_mstfn
  type: varchar
  description: 處理者單位姓名+時區
  note: '格式：單位+姓名+空格+時區 ex: 直團王大明 TW'
