table: isbum00
database: LionGroupERP
module: 財務結算 (ISBUM)
aliases:
- Bu 事業體主檔
- 財務結算
- isbum00
- BUM00
- ISBUM00
description: Bu 事業體主檔。定義雄獅集團各 BU（Business Unit）事業體的基本資料，是整個系統 BU 分類的根基，被訂單、產品、分銷等多個模組參照
columns:
- name: bu00_bu
  type: varchar
  pk: true
  description: 雄獅 BU 代碼
- name: bu00_cname
  type: varchar
  description: 中文名稱
- name: bu00_ename
  type: varchar
  description: 英文名稱
- name: bu00_dname
  type: varchar
  description: 顯示名稱
- name: bu00_desc
  type: varchar
  description: 備註
- name: bu00_industry
  type: varchar
  description: 行業別代碼
- name: bu00_logo
  type: varchar
  description: logo 圖檔檔名
  note: 固定放 `iis-erp\images`，命名規則：`logo_bu_代碼.jpg`
- name: bu00_order
  type: int
  description: 顯示順序
- name: bu00_sts
  type: bit/int
  description: 已作廢
  note: 1=作廢, 0=啟用
- name: bu00_mstfn
  type: varchar
  description: 增修人員
- name: bu00_mdate
  type: datetime
  description: 增修系統時間
