table: ssorm11
database: LionGroupERP
module: 訂單管理系統 (Sales Order)
aliases:
- 訂單明細副檔
- ssorm11
- ORM11
- SSORM11
description: 訂單明細副檔。記錄訂單旅客的詳細聯絡資訊、護照資料、緊急聯絡人、補助金申請等附加資料
columns:
- name: or11_ordr
  type: varchar
  fk: ssorm10.orer_ordr
  description: 訂單編號
  pk: true
- name: or11_year
  type: varchar
  fk: ssorm10.orer_year
  description: 訂單年度
- name: or11_seq
  type: int
  fk: ssorm10.orer_seq
  description: 訂單明細序號
- name: or11_htel
  type: varchar
  description: 聯絡電話-住家
- name: or11_mtel
  type: varchar
  description: 聯絡電話-行動
- name: or11_otel
  type: varchar
  description: 聯絡電話-公司
- name: or11_email
  type: varchar
  description: E-MAIL
- name: or11_email_send
  type: bit
  description: 接受電子報
  note: (0) 1=接受
- name: or11_address
  type: varchar
  description: 地址
- name: or11_postcode
  type: varchar
  description: 郵遞區號
- name: or11_urgent_name
  type: varchar
  description: 緊急聯絡人
- name: or11_urgent_relman
  type: varchar
  fk_note: FK → Istbm00 (RELMAN)
  description: 與緊急聯絡人關係
- name: or11_urgent_htel
  type: varchar
  description: 緊急聯絡人聯絡電話-住家
- name: or11_urgent_mtel
  type: varchar
  description: 緊急聯絡人聯絡電話-行動
- name: or11_urgent_otel
  type: varchar
  description: 緊急聯絡人聯絡電話-公司
- name: or11_pssprt
  type: varchar
  description: 護照號碼
- name: or11_pidate
  type: datetime
  description: 護照生效日期
- name: or11_pvdate
  type: datetime
  description: 護照到期日期
- name: or11_pplace
  type: varchar
  description: 發照地
- name: or11_visa_cn
  type: varchar
  description: 台胞證號碼
- name: or11_date_cn
  type: datetime
  description: 台胞證效期
- name: or11_visa_cntimes
  type: varchar
  description: 台胞證次數
  note: 新增 2024/05/02
- name: or11_visa2_cn
  type: varchar
  description: 入台證號
- name: or11_meat
  type: varchar
  fk_note: FK → Istbm00 (MEAT)
  description: 特殊飲食
- name: or11_al_card
  type: varchar
  description: 航空公司會員卡號
- name: or11_room
  type: varchar
  description: 業務分房
- name: or11_op_desc
  type: varchar
  description: OP分房表備註說明
- name: or11_desc
  type: varchar
  description: 業務備註說明
- name: or11_tkseq
  type: varchar
  description: 機票號碼
  note: For 長榮點券記錄每位客人的票號
- name: or11_helpstfn
  type: varchar
  description: 補助金申請員工碼
  note: B2E訂單才要用，資料很少
- name: or11_helpname
  type: varchar
  description: 補助金申請員工姓名
- name: or11_helpamt
  type: decimal
  description: 補助金金額
- name: or11_help
  type: bit
