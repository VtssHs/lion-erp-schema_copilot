  note: 1=核准，尚未：累計到主檔，cxl旅客後累計要扣除
- name: or11_helpfamt
  type: decimal
  description: 補助金核准金額
  note: For 雄獅員工團申請補助，helpamt=null，要申請set on
- name: or11_helpman
  type: varchar
  description: 補助金審核人員
- name: or11_helpdate
  type: datetime
  description: 補助金審核日期
- name: or11_helpdesc
  type: varchar
  description: 補助金審核備註
