table: ssorm03
database: LionGroupERP
module: 訂單管理系統 (Sales Order)
aliases:
- 訂單帳款副檔
- ssorm03
- ORM03
- SSORM03
description: 訂單帳款副檔。訂單業績計算、應收帳款管理與匯率處理
columns:
- name: or03_ordr
  type: varchar
  fk: ssorm00.ordr_ordr
  description: 訂單編號
  pk: true
- name: or03_year
  type: varchar
  fk: ssorm00.ordr_year
  description: 訂單年度
- name: or03_amt
  type: decimal
  description: 交易金額
  note: 由訂單功能設定3個欄位
- name: or03_curr
  type: varchar
  description: 交易幣別
  note: 訂單新增依 opagm93 預設幣別
- name: or03_erat
  type: decimal
  description: 報價匯率
- name: or03_countym
  type: varchar
  description: 業績年月
  note: NULL=訂單新增待計算, 0=修改待計算, 1=已計算, F=由財會手動設定
- name: or03_prof
  type: varchar
  description: 業績單位
- name: or03_sales
  type: varchar
  description: 業績業務
- name: or03_team
  type: varchar
  description: 業績組別
  note: 記錄第一次計算訂單業績的業務，之後的異動都算該名業務
- name: or03_rdate
  type: datetime
  description: 應收帳款日
- name: or03_rdate_tran
  type: datetime
  description: 已計算應收帳款日
- name: or03_rpct
  type: decimal
  description: 應收帳款尾款百分比
  note: 預設100; 若為NULL也是100; 例：尾款10則表示90%在出發日收足，10%是在 or03_rdate 才要收。新增 2021/04/28
