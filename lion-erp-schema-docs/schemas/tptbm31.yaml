table: tptbm31
database: LionGroupERP
module: 標準團名管理 (TPTBM)
aliases:
- 海外 FIT 票統計大類代碼檔
- 標準團名管理
- tptbm31
- TBM31
- TPTBM31
description: 海外 FIT 票統計大類代碼檔。定義海外 FIT 票的統計大類代碼，供報表統計歸類使用，是 tptbm30 地區代碼的上層分類
columns:
- name: tb31_rpt
  type: varchar
  pk: true
  description: 代碼
- name: tb31_name
  type: varchar
  description: 名稱
- name: tb31_order
  type: int
  description: 顯示順序
- name: tb31_sts
  type: bit/int
  description: 已作廢
  note: 1=作廢, 0=啟用
- name: tb31_mstfn
  type: varchar
  description: 維護者姓名及時區
  note: 格式：單位+姓名+空格+時區，例：`北票林小鈴 TW`
- name: tb31_msysdate
  type: datetime
  description: 維護主機時間
