table: tppdm16
database: LionGroupERP
module: 團體產品系統 (Group Product)
aliases:
- 團體副檔
- tppdm16
- PDM16
- TPPDM16
description: 團體副檔。團體主檔的擴充資料，涵蓋簽證、費用包含、旅遊契約、保險、交班表等詳細設定
columns:
- name: pd16_prod
  type: varchar(10)
  fk: tppdm10.prod_prod
  description: 團號
  pk: true
- name: pd16_prodcomp
  type: varchar(2)
  description: 團控公司
- name: pd16_vscountry1
  type: varchar(3)
  fk_note: FK → 國家代碼表
  description: 團體所需簽證-國家代碼
- name: pd16_vsseq1
  type: varchar(3)
  fk_note: FK → 簽證類型表
  description: 團體所需簽證-代碼
- name: pd16_vsinc1
  type: char(1)
  description: 團費是否包含簽證費
  note: Y=包含, N=不包含
- name: pd16_vsfdate1
  type: datetime
  description: 簽證使用起日
- name: pd16_vstdate1
  type: datetime
  description: 簽證使用訖日
- name: pd16_vscountry2
  type: varchar(3)
  fk_note: FK → 國家代碼表
  description: 團體所需簽證-國家代碼
- name: pd16_vsseq2
  type: varchar(3)
  fk_note: FK → 簽證類型表
  description: 團體所需簽證-代碼
- name: pd16_vsinc2
  type: char(1)
  description: 團費是否包含簽證費
  note: Y=包含, N=不包含
- name: pd16_vsfdate2
  type: datetime
  description: 簽證使用起日
- name: pd16_vstdate2
  type: datetime
  description: 簽證使用訖日
- name: pd16_visa_i
  type: varchar(500)
  description: 包簽證費
  note: 前台顯示內容
- name: pd16_visa_idesc
  type: varchar(500)
  description: 包簽證費說明
  note: 詳細說明
- name: pd16_visa_n
  type: varchar(500)
  description: 不包簽證費
  note: 前台顯示內容
- name: pd16_visa_ndesc
  type: varchar(500)
  description: 不包簽證費說明
  note: 詳細說明
- name: pd16_airp_i
  type: varchar(500)
  description: 包機場稅費
  note: 前台顯示內容
- name: pd16_airp_idesc
  type: varchar(500)
  description: 包機場稅費說明
  note: 詳細說明
- name: pd16_airp_n
  type: varchar(500)
  description: 不包機場稅費
  note: 前台顯示內容
- name: pd16_airp_ndesc
  type: varchar(500)
  description: 不包機場稅費說明
  note: 詳細說明
- name: pd16_tick_n
  type: varchar(500)
  description: 湊票不包機場稅費
  note: 湊票專用
- name: pd16_tick_ndesc
  type: varchar(500)
  description: 湊票不包機場稅費說明
- name: pd16_meat_a
  type: decimal(10,2)
  description: Local團不含大人餐費
  note: 金額
- name: pd16_meat_c
  type: decimal(10,2)
  description: Local團不含小孩餐費
  note: 金額
- name: pd16_desc1
  type: text
  description: 直客 B2C 備註
  note: 前台顯示給一般消費者
- name: pd16_desc4
  type: text
  description: 同行 B2B 備註
  note: 顯示給旅行同業
- name: pd16_desc
  type: text
  description: 內部備註
  note: 僅內部系統可見
- name: pd16_tpdesc
  type: text
  description: 售價說明
  note: 由產品人員填寫，提供主管審核售價時參考
- name: pd16_cxl_desc
  type: text
  description: 取消說明
  note: 取消政策說明
- name: pd16_booking_desc
  type: text
  description: 預訂說明
  note: 預訂須知
- name: pd16_shiftdesc
  type: text
  description: 交班表備註
  note: 交班表專用備註
- name: pd16_n1
  type: char(1)
  description: 護照費用
  note: 空白=未確定, Y=包含, N=不包含
- name: pd16_n2
  type: char(1)
  description: 簽證費用
  note: 空白=未確定, Y=包含, N=不包含
- name: pd16_n3
  type: char(1)
  description: 台灣機場稅
  note: 空白=未確定, Y=包含, N=不包含
- name: pd16_n4
  type: char(1)
  description: 兵險及燃油費
  note: 空白=未確定, Y=包含, N=不包含
- name: pd16_n5
  type: char(1)
  description: 中正/小港機場接送費
  note: 往返中正/小港機場之一切接送費用
- name: pd16_n6
  type: char(1)
  description: 服務人員小費
  note: 團體=領隊, 個人=導遊及其他服務人員之服務小費
- name: pd16_n7
  type: char(1)
  description: 機場與旅館接送費
  note: 團體=無, 個人=旅遊期間機場、港口、車站等與旅館間接送費用
- name: pd16_n8
  type: char(1)
  description: 國外機場稅
  note: 國旅團只有 n6、n7 兩項
- name: pd16_cxl1
  type: bit
  description: 屬包機團
  note: 1=印到契約書上
- name: pd16_cxl2
  type: bit
  description: 屬遊輪產品
  note: 1=啟用郵輪條款
- name: pd16_cxl3
  type: bit
  description: 含觀光列車
  note: 1=啟用鐵路條款
- name: pd16_cxl4
  type: bit
  description: 含保證住房旅館
  note: 1=啟用住房保證條款
- name: pd16_cxl5
  type: bit
  description: 含特殊表演門票
  note: 1=啟用表演票券條款
- name: pd16_cxl6
  type: bit
  description: 含特殊競賽門票
  note: 1=啟用競賽票券條款
- name: pd16_cxl7
  type: bit
  description: Club Med 契約加註
  note: 1=啟用 Club Med 專屬條款
- name: pd16_cxl8
  type: bit
  description: 郵輪旅遊契約加註
  note: 1=啟用郵輪旅遊專屬條款
- name: pd16_pakname
  type: varchar(50)
  description: 聯合出團名稱
  note: 與其他旅行社聯營時使用
- name: pd16_pakagent
  type: varchar(50)
  description: 出團旅行社
  note: 實際出團的旅行社名稱
- name: pd16_safeno
  type: varchar(20)
  description: 保險證號
  note: 國泰保險上傳資料用
- name: pd16_safeseq
  type: varchar(10)
  description: 保險收件序號
- name: pd16_safecode
  type: varchar(10)
  fk_note: FK → 保險承辦單位代碼表
  description: 承辦單位
- name: pd16_safedate
  type: datetime
  description: 保險起時
  note: 保險生效時間
- name: pd16_safemode
  type: varchar(10)
  fk_note: FK → 交通工具代碼表
  description: 交通工具
- name: pd16_saferate
  type: decimal(10,4)
  description: 保險費率
- name: pd16_safedays
  type: int
  description: 保險天數
- name: pd16_SafePolicyUrl
  type: varchar(500)
  description: 保單列印及下載 URL
- name: pd16_SafeInsComp
  type: varchar(10)
  fk_note: FK → 保險公司代碼表
  description: 投保對象代碼
- name: pd16_prod2
  type: varchar(10)
  description: 併到團號投保
  note: 合併上傳保險，設在線控團體聯結的台灣契約書裡面
- name: pd16_busline1
  type: varchar(20)
  description: 觀巴去程路線
  note: 用於觀巴行程控車位
- name: pd16_busline2
  type: varchar(20)
  description: 觀巴回程路線
- name: pd16_5rptno
  type: varchar(30)
  description: 出境大陸地區申報電子編號
  note: 大陸線用，向移民署申報
- name: pd16_90mstfn
  type: varchar(50)
  description: 價格維護者單位姓名時區
  note: '格式: "單位+姓名+空格+時區" ex: "直團王大明 TW"'
- name: pd16_90mdate
  type: datetime
  description: 價格當地維護日期
- name: pd16_90msysdate
  type: datetime
  description: 價格主機時間
- name: pd16_snapdate
  type: datetime
  description: 解鎖時間
  note: 團控解鎖時間戳記
- name: pd16_godate
  type: datetime
  description: 成團勾選時間
  note: 確認成團的時間
- name: pd16_demandcode
  type: varchar(20)
  fk_note: FK → istbm81 (DEMANDLIST)
  description: 需求單對應代碼
- name: pd16_shiftcheck
  type: varchar(100)
  description: 交班表報到時間
  note: 前台顯示給客人的報到時間
- name: pd16_shiftmeet
  type: varchar(200)
  description: 交班表集合時間地點
  note: 詳細集合資訊
- name: pd16_checkin_no
  type: varchar(20)
  description: 報到區號碼
  note: 機場報到櫃檯區號
