table: tppdm14
database: LionGroupERP
module: TPPDM - 團體產品管理
aliases:
- 團體領隊建議核派名單檔
- tppdm14
- PDM14
- TPPDM14
description: 團體領隊建議核派名單檔。區分同一團的多位候選人
columns:
- name: pd14_prod
  type: varchar(20)
  nullable: false
  pk: true
  description: 團號
- name: pd14_prodcomp
  type: varchar(2)
  nullable: false
  pk: true
  description: 團控公司
- name: pd14_seq
  type: int
  nullable: false
  description: 序號
  note: 同一團可有多位候選領隊
- name: pd14_tl
  type: varchar(10)
  nullable: true
  fk: opagm20
  description: 員編
  note: 領隊員工編號
- name: pd14_name
  type: varchar(50)
  nullable: true
  description: 姓名
  note: 領隊姓名
- name: pd14_sts
  type: char(1)
  nullable: true
  description: 建議/核派/自薦
  note: 0-建議, 1-核派, 2-自薦（滑雪教練）
- name: pd14_tlsta
  type: char(1)
  nullable: true
  description: 身份
  note: 空白-專業, 1-員工, 2-同行借調
- name: pd14_main
  type: char(1)
  nullable: true
  description: 主領隊
  note: 主領隊標記，回寫到 tppdm12
