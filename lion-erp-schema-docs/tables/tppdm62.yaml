table: tppdm62
database: LionGroupERP
module: 團體產品管理 (TPPDM) — 郵輪子系統
aliases:
- 郵輪岸上觀光主檔
- tppdm62
- PDM62
- TPPDM62
description: 郵輪岸上觀光主檔。定義郵輪行程可選購的岸上觀光項目主檔，涵蓋岸上觀光、船上活動、機票、酒店四大類別，記錄售價、成本、集合資訊等完整資料
columns:
- name: pd62_localtour
  type: varchar
  pk: true
  description: 編號
- name: pd62_sts
  type: bit/int
  description: 已停用
  note: 1=停用，0=啟用
- name: pd62_type
  type: varchar
  description: 類別
  note: 1=岸上觀光，2=船上活動，3=機票，4=酒店
- name: pd62_name
  type: varchar
  description: 名稱
- name: pd62_country
  type: varchar
  description: 國家
- name: pd62_city
  type: varchar
  description: 城市
- name: pd62_desc
  type: nvarchar
  description: 說明
- name: pd62_pic
  type: varchar
  description: 岸上觀光圖片
- name: pd62_seat
  type: int
  description: 人數
- name: pd62_meal
  type: varchar
  description: 含餐
  note: 1=含餐
- name: pd62_cguide
  type: varchar
  description: 華語導遊
  note: 1=華語導遊
- name: pd62_tour_time
  type: varchar
  description: 行程時間
- name: pd62_place
  type: varchar
  description: 集合地點
- name: pd62_time
  type: varchar
  description: 集合時間
- name: pd62_amt_curr
  type: varchar
  description: 售價幣別
- name: pd62_amt_a
  type: decimal
  description: 大人小孩售價
- name: pd62_amt_c
  type: decimal
  description: 小孩售價
- name: pd62_amt_i
  type: decimal
  description: 嬰兒售價
- name: pd62_cost_curr
  type: varchar
  description: 成本幣別
- name: pd62_cost_a
  type: decimal
  description: 大人小孩成本
- name: pd62_cost_c
  type: decimal
  description: 小孩成本
- name: pd62_cost_i
  type: decimal
  description: 嬰兒成本
- name: pd62_infseat
  type: varchar
  description: 嬰兒佔位
  note: 1=佔位，0=不佔位（預設）
- name: pd62_matchname
  type: varchar
  description: 比對標準團名
  note: 多值用分號區隔
- name: pd62_matchline
  type: varchar
  description: 比對線別
  note: 多值用分號區隔
- name: pd62_notshow
  type: bit
  description: 前台不顯示
  note: 0=顯示，1=不顯示
- name: pd62_mstfn
  type: varchar
  description: 維護者姓名及時區
  note: 格式：單位+姓名+空格+時區，例：`資訊王大明 TW`；此資料未存當地時間，目前只用於台灣故無異常
- name: pd62_msysdate
  type: datetime
  description: 維護主機時間
