table: tppdm61
database: LionGroupERP
module: 團體產品管理 (TPPDM) — 郵輪子系統
aliases:
- 郵輪接駁車
- tppdm61
- PDM61
- TPPDM61
description: 郵輪接駁車。記錄郵輪團的接駁車輛資訊，包含車輛基本資料、司機資訊、分車狀態與領隊指派
columns:
- name: pd61_bus
  type: varchar
  description: 系統編號
  note: 格式：年度 2 碼 + 流水號 4 碼
- name: pd61_name
  type: varchar
  description: 標準團名
- name: pd61_d8
  type: datetime
  description: 出團日期
- name: pd61_bus_name
  type: varchar
  description: 車號
- name: pd61_car_licence
  type: varchar
  description: 車牌號碼
- name: pd61_seat
  type: int
  description: 座位數
- name: pd61_type
  type: varchar
  description: 用車別
  note: 0=去，1=回，2=觀光(參加)，3=觀光(不參加)
- name: pd61_station
  type: varchar
  description: 上下車地
- name: pd61_time
  type: varchar
  description: 出發時間
- name: pd61_dr_cname
  type: varchar
  description: 司機姓名
- name: pd61_dr_mtel
  type: varchar
  description: 司機手機
- name: pd61_tl
  type: varchar
  description: 領隊員編
- name: pd61_tl_cname
  type: varchar
  description: 領隊姓名
- name: pd61_ok
  type: varchar
  description: 分車完成
  note: 0=未分車，1=開始分車，2=分車完成
- name: pd61_mstfn
  type: varchar
  description: 維護者姓名
  note: 格式：單位+姓名，例：`直團王大明`（無時區）
- name: pd61_msysdate
  type: datetime
  description: 維護時間
