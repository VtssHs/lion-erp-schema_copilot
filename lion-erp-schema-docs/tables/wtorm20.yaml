table: wtorm20
database: LionGroupERP
module: 網位單管理系統 (Web Transaction Order)
aliases:
- 訂位單航段檔
- 網位單管理系統
- wtorm20
- ORM20
- WTORM20
description: 訂位單航段檔。記錄訂位單中每個航段（含國內行程、火車/站）的詳細資訊，包含班機、出發地/抵達地、時間、艙等等
columns:
- name: Wor20_wtordr
  type: varchar
  fk: wtorm00.Wor00_wtordr
  description: 訂位單編號
  pk: true
- name: Wor20_wtyear
  type: varchar
  fk: wtorm00.Wor00_wtyear
  description: 訂位單年碼
  note: ；含國內行程火車(站)資料
- name: Wor20_seq
  type: int
  description: 序號
  note: 航段流水號
- name: Wor20_carr
  type: varchar
  description: 航空公司
- name: Wor20_flightNo
  type: varchar
  description: 班機號碼
- name: Wor20_codeshare
  type: varchar
  description: 聯營航空
- name: Wor20_equipment
  type: varchar
  description: 機型
- name: Wor20_flytime
  type: int
  description: 飛行時間
  note: 分鐘計算
- name: Wor20_comeback
  type: varchar
  description: 回程班機
  note: 0=去; 1=回（雙獅家緯需求）
- name: Wor20_seat
  type: varchar
  description: 座位
  note: 例：32A,32B
- name: Wor20_segment
  type: varchar
  description: 航段
  note: 用途待確認
- name: Wor20_sts
  type: varchar
  description: 狀況
- name: Wor20_class
  type: varchar
  description: 艙等代碼
  note: For 雙獅 LCC 艙等為 2 碼
- name: Wor20_classname
  type: varchar
  description: 艙等名稱
  note: ECONOMY=經濟艙; PREMIUM_ECONOMY=豪華經濟艙; BUSINESS=商務艙; FIRST=頭等艙
- name: Wor20_fairport
  type: varchar
  description: 出發地（機場代碼）
- name: Wor20_fcity2
  type: varchar
  description: 出發城市
- name: Wor20_fcountry2
  type: varchar
  description: 出發國家
  note: 存中文字
- name: Wor20_Fterminal
  type: varchar
  description: 出發航廈
- name: Wor20_fdate
  type: datetime
  description: 出發日期
- name: Wor20_ftime
  type: varchar
  description: 出發時間
- name: Wor20_tairport
  type: varchar
  description: 抵達地（機場代碼）
- name: Wor20_tcity2
  type: varchar
  description: 抵達城市
- name: Wor20_tcountry2
  type: varchar
  description: 抵達國家
- name: Wor20_Tterminal
  type: varchar
  description: 抵達航廈
- name: Wor20_tdate
  type: datetime
  description: 抵達日期
- name: Wor20_ttime
  type: varchar
  description: 抵達時間
- name: Wor20_service
  type: varchar
  description: 停留或轉機
