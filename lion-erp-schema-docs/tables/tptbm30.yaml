table: tptbm30
database: LionGroupERP
module: 標準團名管理 (TPTBM)
aliases:
- 海外 FIT 票地區代碼檔
- 標準團名管理
- tptbm30
- TBM30
- TPTBM30
description: 海外 FIT 票地區代碼檔。定義海外 FIT（Free Independent Travel）票使用的地區代碼，供票務系統分類與統計報表使用
columns:
- name: tb30_area
  type: varchar
  pk: true
  description: 代碼
- name: tb30_name
  type: varchar
  description: 名稱
- name: tb30_rpt
  type: varchar
  description: 統計大類
- name: tb30_order
  type: int
  description: 顯示順序
- name: tb30_sts
  type: bit/int
  description: 已作廢
  note: 1=作廢, 0=啟用
- name: tb30_mstfn
  type: varchar
  description: 維護者姓名及時區
  note: 格式：單位+姓名+空格+時區，例：`北票林小鈴 TW`
- name: tb30_msysdate
  type: datetime
  description: 維護主機時間
