table: tppdm17
database: LionGroupERP
module: 團體產品系統 (Group Product)
aliases:
- 團體關連檔
- tppdm17
- PDM17
- TPPDM17
description: 團體關連檔。記錄團與團之間的關聯關係（主團/子團、導領/接團/JOIN）
columns:
- name: pd17_prod
  type: varchar
  pk: true
  fk: tppdm10.prod_prod
  description: 主團號
  note: (part)
- name: pd17_prodcomp
  type: varchar
  description: 主團控公司
- name: pd17_chdprod
  type: varchar
  pk: true
  fk: tppdm10.prod_prod
  description: 子團號
  note: (part)
- name: pd17_chdprodcomp
  type: varchar
  description: 子團號公司
- name: pd17_type
  type: char(1)
  pk: true
  description: 關聯型態
  note: (part), **1**=導領(預設), **2**=接團, **3**=JOIN
- name: pd17_memo
  type: varchar/text
  description: 說明
  note: 關聯關係的補充說明
- name: pd17_idate
  type: datetime
  description: 新增日期
  note: 記錄建立時間
- name: pd17_istfn
  type: varchar
  description: 新增者員編
  note: 建立此關聯的員工代號
- name: pd17_mdate
  type: datetime
  description: 修改日期
  note: 最後修改時間
- name: pd17_mstfn
  type: varchar
  description: 修改者員編
  note: 最後修改者員工代號
