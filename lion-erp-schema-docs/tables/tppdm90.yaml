table: tppdm90
database: LionGroupERP
module: 團體產品系統 (Group Product)
aliases:
- 團體售價資料檔
- 團體的售價明細
- tppdm90
- PDM90
- TPPDM90
description: 團體售價資料檔。團體的售價明細（多房型、多價格方式）
columns:
- name: pd90_prod
  type: varchar
  fk: tppdm10.prod_prod
  description: 團號
  note: '**PK1**'
- name: pd90_prodcomp
  type: varchar
  description: 團控公司
  note: '**PK2**'
- name: pd90_kind
  type: char(1)
  description: 直批別
  note: '**PK3**, D=直客, W=批售'
- name: pd90_pmark
  type: char(1)
  description: 價格方式
  note: '**PK4**, 1=售價, 6=TKT湊票, 7=JOIN（同訂單）'
- name: pd90_act
  type: char(1)
  description: 房型
  note: '**PK5**, 見下方說明'
- name: pd90_a
  type: decimal
  description: 大人售價
  note: 遊輪:第一人
- name: pd90_c1
  type: decimal
  description: 小孩佔床售價
  note: 遊輪:第二人
- name: pd90_c2
  type: decimal
  description: 小孩不佔床售價
  note: 遊輪:第三人
- name: pd90_c3
  type: decimal
  description: 小孩加床售價
  note: 遊輪:第四人
- name: pd90_i
  type: decimal
  description: 嬰兒售價
  note: 遊輪:嬰兒
- name: pd90_atax
  type: decimal
  description: 成人稅金
- name: pd90_c1tax
  type: decimal
  description: 小孩佔床稅金
- name: pd90_c2tax
  type: decimal
  description: 小孩不佔床稅金
- name: pd90_c3tax
  type: decimal
  description: 小孩加床稅金
- name: pd90_itax
  type: decimal
  description: 嬰兒稅金
- name: pd90_desc
  type: nvarchar
  description: 房型/備註
- name: pd90_pd98no
  type: varchar
  fk: tppdm98
  description: 房價群組序號
