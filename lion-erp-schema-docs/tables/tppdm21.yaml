table: tppdm21
database: LionGroupERP
module: 團體產品系統 (Group Product)
aliases:
- 日行程檔
- tppdm21
- PDM21
- TPPDM21
description: 日行程檔。行程範本的每日細節（Day by Day）
columns:
- name: pd21_tur2
  type: varchar
  fk: tppdm20.pd20_tur2
  description: 行程代號
  pk: true
- name: pd21_num
  type: int
  description: 流水號
  note: 每個行程內的日次序號
- name: pd21_day
  type: int
  description: 天數
  note: 第幾天（通常 = pd21_num）
- name: pd21_data
  type: nvarchar
  description: 類別
  note: 早餐/午餐/晚餐/住宿/景點等分類
- name: pd21_name
  type: nvarchar
  description: 行程點簡介
  note: 該日行程重點名稱
- name: pd21_title
  type: nvarchar
  description: 特別說明
  note: 該日行程特別注意事項
- name: pd21_desc
  type: nvarchar(max)
  description: 行程說明
  note: 該日完整行程描述
- name: pd21_hotel_desc1
  type: nvarchar
  description: 旅館地點
  note: 住宿地點名稱
- name: pd21_hotel_desc2
  type: nvarchar
  description: 旅館或同級說明
  note: 住宿飯店或同級備註
- name: pd21_file
  type: varchar
  description: 照片檔名
  note: 該日行程的代表圖片檔名
- name: pd21_ctokey
  type: varchar
  fk_note: FK → Ctom85 (VIEW)
  description: 右側景點CTO資料代碼
- name: pd21_rowversion
  type: timestamp
  description: 時間戳記
  note: 新增時會自行產生，用於併發控制
