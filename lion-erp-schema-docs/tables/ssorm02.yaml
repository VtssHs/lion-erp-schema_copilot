table: ssorm02
database: LionGroupERP
module: 訂單管理系統 (Sales Order)
aliases:
- 訂單副檔
- ssorm02
- ORM02
- SSORM02
description: 訂單副檔。訂單關聯產品、訂位系統（CRS）、PNR 與通知事項管理
columns:
- name: or02_ordr
  type: varchar
  fk: ssorm00.ordr_ordr
  description: 訂單編號
  pk: true
- name: or02_year
  type: varchar
  fk: ssorm00.ordr_year
  description: 訂單年度
  note: ssorm00 left join 線8訂單有額外處理時才有
- name: or02_crs
  type: varchar
  fk_note: FK → Istbm00 (CRSKIND)
  description: 訂位系統
- name: or02_pnr
  type: varchar
  description: PNR
  note: Passenger Name Record
- name: or02_kind
  type: varchar
  description: 關聯類別
  note: TK=Tc開票, FM=因跨國/Bu的主產品訂單
- name: or02_wtordr
  type: varchar
  description: 關聯TC訂單流水號 / 源頭訂單
  note: FM時為主產品訂單
- name: or02_wtyear
  type: varchar
  description: 關聯TC訂單訂單年 / 源頭訂單
  note: FM時為主產品訂單
- name: or02_key1
  type: varchar
  description: 對應產品編號KEY1
  note: 票價代號, 系列, 票券編號, 團號公司
- name: or02_key2
  type: varchar
  description: 對應產品編號KEY2
  note: 票產代碼, 產品
- name: or02_key3
  type: varchar
  description: 對應產品編號KEY3
  note: 行程代號, 團號
- name: or02_prof
  type: varchar
  description: 處理單位
- name: or02_pstfn
  type: varchar
  description: 處理人員
- name: or02_stfn
  type: varchar
  description: 通知處理人員
- name: or02_desc
  type: varchar
  description: 通知事項
  note: 5=Eterm, 9=其他
- name: or02_date
  type: datetime
  description: 建檔時間
  note: 第一次上處理單位的時間，因為網單轉入FIT時就 INSERT 本筆
