table: tptbm00
database: LionGroupERP
module: ''
aliases:
- 標準團名資料檔
- tptbm00
- TPTBM00
description: 標準團名資料檔。旅遊館網頁上的搜尋引擎（改在各旅遊館設定）
columns:
- name: tbm0_code
  type: varchar(36)
  pk: true
  description: 標準團名代碼（GUID）
- name: tbm0_name
  type: varchar
  description: 標準團名
- name: tbm0_b2cname
  type: varchar
  description: B2C 標準團名
- name: tbm0_webname
  type: varchar
  description: 旅遊館網上名稱（短版）
- name: tbm0_namemain
  type: varchar
  description: 標准團名：主團名
- name: tbm0_namelvl
  type: varchar(1)
  description: 標准團名：分級
- name: tbm0_namemkt
  type: varchar
  description: 標准團名：行銷說明
- name: tbm0_sts
  type: int
  description: 已停用 (1=停用, 0=啟用)
- name: tbm0_inb
  type: varchar
  description: INB 行程
- name: tbm0_fit
  type: varchar(1)
  description: 團型為自由行
- name: tbm0_country
  type: varchar
  description: 出團雄獅國家
- name: tbm0_line
  type: varchar
  fk: istbm10
  description: 線別
- name: tbm0_dline
  type: varchar
  description: 副線別
- name: tbm0_area
  type: varchar
  description: 地區
- name: tbm0_darea
  type: varchar
  description: 細地區
- name: tbm0_days
  type: int
  description: 天數
- name: tbm0_nameattr
  type: varchar
  description: 產品屬性（一般/皇家...）
- name: tbm0_amtlvl
  type: varchar(1)
  description: 價格等級
- name: tbm0_webarea
  type: varchar
  fk: tptbm20
  description: 目的地代碼（團搜尋 bar3）
- name: tbm0_attr1
  type: varchar
  fk_note: FK → istbm00 (ATTR)
  description: 團體屬性 1
- name: tbm0_attr2
  type: varchar
  fk_note: FK → istbm00 (ATTR)
  description: 團體屬性 2
- name: tbm0_attr3
  type: varchar
  fk_note: FK → istbm00 (ATTR)
  description: 團體屬性 3
- name: tbm0_psubject1
  type: varchar
  fk_note: FK → istbm00 (PSUBJECT)
  description: 主題旅遊 1
- name: tbm0_psubject2
  type: varchar
  fk_note: FK → istbm00 (PSUBJECT)
  description: 主題旅遊 2
- name: tbm0_psubject3
  type: varchar
  fk_note: FK → istbm00 (PSUBJECT)
  description: 主題旅遊 3
- name: tbm0_keyword
  type: varchar
  description: 關鍵字（,峇里島,烏布,）
- name: tbm0_usp
  type: varchar
  description: USP 網頁網址
- name: tbm0_picno
  type: varchar
  description: CMS 圖片 NO
- name: tbm0_planticket
  type: varchar
  description: 產品種類：是否為計劃旅遊票
- name: tbm0_feature_src
  type: varchar
  description: 特色來源
- name: tbm0_triptype
  type: varchar
  description: 旅遊型態
- name: tbm0_prof
  type: varchar
  description: 單位
- name: tbm0_mstfn
  type: varchar
  description: 維護者姓名（單位+姓名）
- name: tbm0_msysdate
  type: datetime
  description: 維護主機時間
- name: tbm0_mstfn2
  type: varchar
  description: 主題旅遊維護者姓名
- name: tbm0_msysdate2
  type: datetime
  description: 主題旅遊維護主機時間
